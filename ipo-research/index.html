  <div id="calendarTab">
    <div class="card">
      <h3>📅 近期IPO打新日历</h3>
      <div class="ipo-row header"><div>股票名称</div><div>行业</div><div>发行价</div><div>市盈率</div></div>
      <div id="calendarList"></div>
    </div>
    <div class="tip-box">
      <strong>打新提示：</strong>科创板/创业板需开通相应权限；沪市1万市值对应1000股；深市5千市值对应500股。

      <input type="text" id="ipoNameInput" placeholder="输入IPO名称，如：华虹半导体" value="华虹半导体">
      <button class="run-btn" onclick="analyzeIPO()">🔭 分析评价</button>

  </div>

      <input type="number" id="amountInput" placeholder="认购金额（万）" value="50">
      <input type="number" id="priceInput" placeholder="预估发行价（元）" value="28">
      <button class="run-btn" onclick="calcLottery()">🎰 计算中签率</button>
    </div>
    <div id="lotteryResult"></div>
  </div>

  <a class="back-home" href="../experience-center.html">← 返回H5体验中心</a>
</div>

<script>
(function(){
  const ipoData = [
    {name:"华虹半导体",code:"688347.SH",date:"2026-06-18",price:"28.00-32.00",pe:"35-42倍",industry:"半导体",type:"科创板",lottery:"0.023%"},
    {name:"中芯集成",code:"688xxx.SH",date:"2026-06-20",price:"18.00-22.00",pe:"28-35倍",industry:"半导体",type:"科创板",lottery:"0.031%"},
    {name:"晶合集成",code:"688xxx.SH",date:"2026-06-25",price:"15.00-18.00",pe:"25-32倍",industry:"半导体",type:"科创板",lottery:"0.045%"},
    {name:"颀中科技",code:"688xxx.SH",date:"2026-07-02",price:"12.00-15.00",pe:"22-28倍",industry:"半导体",type:"科创板",lottery:"0.058%"},
    {name:"百利天恒",code:"688xxx.SH",date:"2026-07-05",price:"35.00-42.00",pe:"48-56倍",industry:"医药",type:"科创板",lottery:"0.018%"},
  ];

  const industryPE = {"半导体":45,"医药":38,"新能源":35,"消费":28,"金融":15};

  function switchTab(tab){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('calendarTab').style.display = tab==='calendar'?'block':'none';
    document.getElementById('analysisTab').style.display = tab==='analysis'?'block':'none';
    document.getElementById('lotteryTab').style.display = tab==='lottery'?'block':'none';
  }
  window.switchTab = switchTab;

  function renderCalendar(){
    const list = document.getElementById('calendarList');
    list.innerHTML = ipoData.map(ipo=>`
      <div class="ipo-row">
        <div><div class="ipo-name">${ipo.name}</div><div style="font-size:11px;color:var(--muted);">${ipo.code}</div></div>
        <div><span class="ipo-badge badge-kcb">${ipo.industry}</span></div>
        <div>${ipo.price}</div>
        <div>${ipo.pe}</div>
      </div>
    `).join('');
  }
  renderCalendar();

  function calcScore(ipo){
    let score = 70;
    if(["半导体","新能源"].includes(ipo.industry)) score += 10;
    if(ipo.industry.includes("医药")) score += 5;
    const peMid = parseFloat(ipo.pe.split('-')[0]);
    if(peMid < 30) score += 15;
    else if(peMid > 50) score -= 15;
    return Math.max(0, Math.min(100, score));
  }

  window.analyzeIPO = function(){
    const name = document.getElementById('ipoNameInput').value.trim() || '华虹半导体';
    const ipo = ipoData.find(i=>i.name.includes(name)) || ipoData[0];
    const avgPE = industryPE[ipo.industry] || 35;
    const peVals = ipo.pe.replace('倍','').split('-').map(parseFloat);
    const peMid = peVals.reduce((a,b)=>a+b,0)/peVals.length;
    const premium = ((peMid-avgPE)/avgPE*100).toFixed(0);
    const score = calcScore(ipo);
    let rating = score>=80?"⭐⭐⭐⭐⭐ 强烈推荐":score>=65?"⭐⭐⭐⭐ 建议认购":score>=50?"⭐⭐⭐ 可选择性认购":"⭐⭐ 谨慎认购";

    const highlights = {
      "半导体": ["国内领先的晶圆代工企业","产能利用率维持高位","客户覆盖国内外主流设计厂"],
      "医药": ["创新药研发管线丰富","核心产品进入临床III期","商业化能力持续增强"]
    };

    document.getElementById('analysisResult').innerHTML = `
      <div class="card">
        <h3>📊 ${ipo.name} IPO分析</h3>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
          <div class="score-ring">
            <svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="32" fill="none" stroke="#e2e8f0" stroke-width="6"/>
              <circle cx="40" cy="40" r="32" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"
                stroke-dasharray="201" stroke-dashoffset="${201*(1-score/100)}" style="transition:stroke-dashoffset 1s ease;"/>
              <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#2563eb"/></linearGradient></defs>
            </svg>
            <div class="score-value"><b>${score}</b><span>综合评分</span></div>
          </div>
          <div style="flex:1;min-width:200px;">
            <div class="rating">${rating}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px;">发行PE: ${ipo.pe} | 行业均值: ~${avgPE}x | 折溢价: ${premium>0?'+'+premium:premium}%</div>
          </div>
        </div>
        <div class="detail-grid">
          <div class="detail-cell"><div class="label">发行价格</div><div class="value">${ipo.price}元</div></div>
          <div class="detail-cell"><div class="label">申购日期</div><div class="value">${ipo.date}</div></div>
          <div class="detail-cell"><div class="label">行业</div><div class="value">${ipo.industry}</div></div>
          <div class="detail-cell"><div class="label">板块</div><div class="value">${ipo.type}</div></div>
        </div>
        <div style="margin-top:14px;"><strong>基本面亮点：</strong></div>
        <div style="font-size:13px;line-height:1.8;">
          ${(highlights[ipo.industry]||["行业龙头地位稳固","技术壁垒较高"]).map(h=>`• ${h}`).join('<br>')}
        </div>
        <div style="margin-top:10px;font-size:12px;color:#991b1b;"><strong>风险提示：</strong>行业竞争加剧；募投项目进度不确定；发行价偏高可能压制上市表现。</div>
      </div>`;
  };

  window.calcLottery = function(){
    const amount = parseFloat(document.getElementById('amountInput').value) || 50;
    const price = parseFloat(document.getElementById('priceInput').value) || 28;
    const units = Math.floor(amount*10000/(price*500))*500;
    const rate = 0.028;
    const tiers = [
      {n:1,label:'1个配号'},
      {n:5,label:'5个配号'},
      {n:10,label:'10个配号'},
      {n:20,label:'20个配号'}
    ];

    document.getElementById('lotteryResult').innerHTML = `
      <div class="card">
        <h3>🎰 中签概率预估</h3>
        <div style="font-size:14px;margin-bottom:12px;"><strong>认购金额：</strong>${amount}万元 | <strong>预估发行价：</strong>${price}元 | <strong>可认购股数：</strong>${units}股</div>
        <div class="ipo-row header"><div>认购金额</div><div>配号数</div><div>预估中签率</div></div>
        ${tiers.map(t=>{
          const prob = Math.min(1, rate*t.n);
          return `<div class="ipo-row"><div>${(t.n*amount).toFixed(0)}万</div><div>${t.label}</div><div style="font-weight:800;color:${prob>0.1?'#10b981':prob>0.05?'#f59e0b':'#ef4444'}">${(prob*100).toFixed(3)}%</div></div>`;
        }).join('')}
        <div class="tip-box" style="margin-top:10px;">
          <strong>中签技巧：</strong>集中火力攻打1-2只确定性高的IPO；顶格认购可显著提高中签率；避开市场追捧的大热IPO；市值较小的IPO更容易炒作。
        </div>
      </div>`;
  };
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 绑定AI分析按钮
    const analyzeBtn = document.querySelector('#analyze-btn, .analyze-btn, [data-action="analyze"]');
    if (analyzeBtn) {
        analyzeBtn.addEventListener('click', async function() {
            const input = document.querySelector('#analyze-input, .analyze-input');
            const context = document.querySelector('#analyze-context, .analyze-context');
            const resultContainer = document.querySelector('#analyze-result, .analyze-result');
            
            const prompt = input ? input.value : '';
            const ctx = context ? context.value : '';
            
            if (!prompt) { alert('请输入分析内容'); return; }
            
            resultContainer.innerHTML = '<div class="api-loading"><div class="loading-spinner"></div><p>AI分析中...</p></div>';
            analyzeBtn.disabled = true;
            
            const result = await LongmaAPI.ai.analyze(prompt, ctx);
            analyzeBtn.disabled = false;
            
            if (result.success) {
                resultContainer.innerHTML = `<div class="api-analysis-result">
                    <h4>分析结果</h4>
                    <div class="content">${result.data.analysis.replace(/\n/g, '<br>')}</div>
                    <div class="meta">模型: ${result.data.model} | 时间: ${result.data.timestamp}</div>
                </div>`;
            } else {
                resultContainer.innerHTML = `<div class="api-error">分析失败: ${result.error}</div>`;
            }
        });
    }
    
    // 绑定报告生成按钮
    const reportBtn = document.querySelector('#report-btn, .report-btn, [data-action="generate-report"]');
    if (reportBtn) {
        reportBtn.addEventListener('click', async function() {
            const resultContainer = document.querySelector('#report-result, .report-result');
            resultContainer.innerHTML = '<div class="api-loading"><div class="loading-spinner"></div><p>报告生成中...</p></div>';
            reportBtn.disabled = true;
            
            const result = await LongmaAPI.ai.generateReport('general', {});
            reportBtn.disabled = false;
            
            if (result.success) {
                resultContainer.innerHTML = `<div class="api-report-result">
                    <h4>生成的报告</h4>
                    <div class="content">${result.data.report.replace(/\n/g, '<br>')}</div>
                </div>`;
            } else {
                resultContainer.innerHTML = '<div class="api-error">报告生成失败</div>';
            }
        });
    }
});
</script>

    <script>
    (function(){
        if('IntersectionObserver' in window){
            var io=new IntersectionObserver(function(entries){
                entries.forEach(function(e){
                    if(e.isIntersecting){
                        var el=e.target;
                        var bg=el.getAttribute('data-bg');
                        if(bg){el.style.backgroundImage='url('+bg+')';el.removeAttribute('data-bg');}
                        io.unobserve(el);
                    }
                });
            },{rootMargin:'100px'});
            document.querySelectorAll('[data-bg]').forEach(function(el){io.observe(el);});
        }
    })();
    </script>
