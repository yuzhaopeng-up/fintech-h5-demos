<script>
(function(){
  function cyrb128(str){
    let h1=1779033703,h2=3144134277,h3=1013904242,h4=2773480762;
    for(let i=0,k;i<str.length;i++){
      k=str.charCodeAt(i);
      h1=h2^Math.imul(h1^k,597399067);
      h2=h3^Math.imul(h2^k,2869860233);
      h3=h4^Math.imul(h3^k,951274213);
      h4=h1^Math.imul(h4^k,2716044179);
    }
    h1=Math.imul(h3^(h1>>>18),597399067);
    h2=Math.imul(h4^(h2>>>22),2869860233);
    h3=Math.imul(h1^(h3>>>17),951274213);
    h4=Math.imul(h2^(h4>>>19),2716044179);
    return [(h1^h2^h3^h4)>>>0,(h2^h1)>>>0,(h3^h1)>>>0,(h4^h1)>>>0];
  }
  function sfc32(a,b,c,d){
    return function(){
      a>>>=0;b>>>=0;c>>>=0;d>>>=0;
      let t=(a+b)|0;
      a=b^b>>>9;
      b=c+(c<<3)|0;
      c=(c<<21)|(c>>>11);
      d=d+1|0;
      t=t+d|0;
      c=c+t|0;
      return (t>>>0)/4294967296;
    };
  }
  function createRng(seed){ const s=cyrb128(seed); return sfc32(s[0],s[1],s[2],s[3]); }

  const fundDB = {
    stock: [
      {name:"易方达深严·深圳100ETF",code:"110020",risk:"高",sharpe:"1.35",fee:0.6,volatility:18.5},
      {name:"嘉实中证红利指数A",code:"100032",risk:"高",sharpe:"1.12",fee:0.8,volatility:16.2},
      {name:"易方达新能源汽车A",code:"001256",risk:"高",sharpe:"0.95",fee:1.2,volatility:22.8},
      {name:"易方达中证半导体A",code:"007301",risk:"高",sharpe:"1.08",fee:1.2,volatility:24.5},
      {name:"易方达中证全指指数A",code:"007339",risk:"高",sharpe:"1.42",fee:0.6,volatility:17.8}
    ],
    bond: [
      {name:"华夏短债债券A",code:"004042",risk:"低",sharpe:"2.15",fee:0.3,volatility:2.1},
      {name:"易方达信用债主体A",code:"007950",risk:"低",sharpe:"1.85",fee:0.4,volatility:3.5},
      {name:"招商银行理财稳健",code:"003103",risk:"中低",sharpe:"1.55",fee:0.5,volatility:5.8},
      {name:"易方达中证银行债A",code:"007343",risk:"低",sharpe:"1.92",fee:0.3,volatility:2.8},
      {name:"广发中债1-3年A",code:"006482",risk:"低",sharpe:"2.05",fee:0.3,volatility:2.5}
    ],
    mixed: [
      {name:"易方达蓝筹精选混合",code:"005827",risk:"中",sharpe:"1.48",fee:1.5,volatility:12.5},
      {name:"富国天惠成长混合",code:"161005",risk:"中",sharpe:"1.35",fee:1.5,volatility:13.8},
      {name:"兴全合泰混合A",code:"163402",risk:"中",sharpe:"1.52",fee:1.5,volatility:11.5},
      {name:"易方达科技创新混合",code:"001938",risk:"中高",sharpe:"1.28",fee:1.5,volatility:15.2},
      {name:"广发多因素混合",code:"002943",risk:"中",sharpe:"1.38",fee:1.2,volatility:12.8}
    ],
    index: [
      {name:"易方达深严·深圳100ETF",code:"110020",risk:"高",sharpe:"1.35",fee:0.6,volatility:18.5},
      {name:"华夏上证50ETF",code:"510050",risk:"高",sharpe:"1.28",fee:0.5,volatility:19.2},
      {name:"南方中证500ETF",code:"510500",risk:"高",sharpe:"1.15",fee:0.5,volatility:20.5},
      {name:"易方达中证全指指数A",code:"007339",risk:"高",sharpe:"1.42",fee:0.6,volatility:17.8},
      {name:"嘉实中证红利指数A",code:"100032",risk:"高",sharpe:"1.12",fee:0.8,volatility:16.2}
    ],
    qdii: [
      {name:"易方达中证港股通A",code:"005777",risk:"高",sharpe:"1.08",fee:1.2,volatility:21.5},
      {name:"易方达纳斯达克100A",code:"161130",risk:"高",sharpe:"1.25",fee:1.0,volatility:18.8},
      {name:"南方道琼斯中国指数A",code:"501018",risk:"高",sharpe:"0.95",fee:1.2,volatility:22.5},
      {name:"易方达标普500指数A",code:"050025",risk:"高",sharpe:"1.18",fee:1.0,volatility:19.5},
      {name:"广发纳斯达克100ETF",code:"159941",risk:"高",sharpe:"1.22",fee:0.8,volatility:18.2}
    ]
  };

  function getRet(rng, horizon, volatility) {
    const base = (rng() * 6 - 1);
    const horizonMult = horizon === '1' ? 0.8 : horizon === '3' ? 1.0 : 1.3;
    const ret = base * horizonMult;
    return ret.toFixed(2);
  }

  function getMaxDD(volatility) {
    return -(volatility * (0.6 + Math.random() * 0.4)).toFixed(1);
  }

  function checkSuitability(fundRisk, userRisk) {
    const riskMap = {'低':1,'中低':2,'中':3,'中高':4,'高':5};
    const fundLevel = riskMap[fundRisk] || 3;
    const userLevel = userRisk === 'low' ? 2 : userRisk === 'medium' ? 3 : 5;
    if(fundLevel <= userLevel) return {label:'适合',class:'match-good'};
    if(fundLevel <= userLevel + 1) return {label:'谨慎',class:'match-caution'};
    return {label:'不匹配',class:'match-no'};
  }

  window.loadAdvisorRecommend = async function(){
    const btn = document.getElementById('advisorBtn');
    if(!btn) return;
    btn.disabled = true; btn.textContent = '⏳ 正在生成投顾方案...';
    const riskPref = document.getElementById('riskPref').value;
    const amount = parseFloat(document.getElementById('amount').value) || 10;
    const riskMap = {'low':'稳健型','medium':'平衡型','high':'激进型'};
    const container = document.getElementById('advisorRecommend');
    container.innerHTML = '<div class="card">⏳ 正在连接统一API...</div>';
    try{
      const resp = await fetch('/api/advisor/recommend',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({task:'推荐基金组合',risk_profile:riskMap[riskPref]||'稳健型',amount:amount})
      });
      const data = await resp.json();
      if(data.code !== 0){ throw new Error(data.message || '请求失败'); }
      const rec = data.data || {};
      const funds = rec.funds || [];
      container.innerHTML = `
        <div class="card" style="border-left:4px solid #2563eb;">
          <h3>🤖 智能投顾推荐</h3>
          <p style="font-size:13px;color:#64748b;margin-bottom:12px;">${rec.knowledge && rec.knowledge.answer ? rec.knowledge.answer : '基于您的风险偏好，AI为您推荐以下基金组合：'}</p>
          <div style="display:grid;gap:8px;">
            ${funds.map((f,i)=>`
              <div class="fund-card" style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:#f8fafc;border-radius:8px;">
                <div>
                  <div class="name" style="font-weight:700;">${i+1}. ${f.name}</div>
                  <div style="font-size:12px;color:#64748b;">${f.code} · ${f.type} · 风险${f.risk}</div>
                  ${f.net_value ? `<div style="font-size:11px;color:#475569;margin-top:2px;">
                    净值: ${f.net_value} <span style="color:${f.daily_change_pct > 0 ? '#059669' : f.daily_change_pct < 0 ? '#dc2626' : '#64748b'};">${f.daily_change_pct > 0 ? '+' : ''}${f.daily_change_pct}% </span>
                    | 估算: ${f.estimate_value}
                  </div>` : ''}
                </div>
                <div style="font-size:12px;color:#2563eb;font-weight:700;">费率 ${f.fee}%</div>
              </div>
            `).join('')}
          </div>
          ${rec.h5_url ? `<p style="margin-top:12px;font-size:12px;">🔗 来源：统一API Agent编排 + RAG 2.0${rec.data_source === 'eastmoney_public_api' ? ' + 天天基金公开数据' : '（演示数据）'}</p>` : ''}
        </div>
      `;
    }catch(e){
      container.innerHTML = `<div class="card" style="color:#dc2626;">投顾推荐失败：${e.message}</div>`;
    }finally{
      btn.disabled = false; btn.textContent = '🤖 获取智能投顾推荐';
    }
  };

  window.runCompare = function(){
    const fundType = document.getElementById('fundType').value;
    const horizon = document.getElementById('horizon').value;
    const riskPref = document.getElementById('riskPref').value;
    const amount = parseFloat(document.getElementById('amount').value) || 10;

    document.getElementById('loading').classList.add('active');
    document.getElementById('result').classList.remove('active');
    document.getElementById('runBtn').disabled = true;

    setTimeout(()=>{
      const seed = fundType + '_' + horizon + '_' + riskPref + '_' + amount;
      const rng = createRng(seed);

      const funds = fundDB[fundType];
      const enriched = funds.map(f => {
        const ret1y = getRet(rng, '1', f.volatility);
        const ret3y = getRet(rng, '3', f.volatility);
        const maxDD = getMaxDD(f.volatility);
        const suit = checkSuitability(f.risk, riskPref);
        return {...f, ret1y, ret3y, maxDD, suit};
      });

      // 排序：复利后收益
      enriched.sort((a,b) => parseFloat(b.ret3y) - parseFloat(a.ret3y));

      const bestFund = enriched[0];
      const worstFund = enriched[enriched.length-1];

      // 风险收益散点
      const riskReturn = enriched.map(f => ({x:f.volatility,y:parseFloat(f.ret3y),name:f.name}));
      const avgRet = (enriched.reduce((s,f)=>s+parseFloat(f.ret3y),0)/enriched.length).toFixed(2);
      const avgVol = (enriched.reduce((s,f)=>s+f.volatility,0)/enriched.length).toFixed(1);
      const avgSharpe = (enriched.reduce((s,f)=>s+parseFloat(f.sharpe),0)/enriched.length).toFixed(2);

      // 投资建议
      const investAmount = amount;
      const suggestedAlloc = enriched.slice(0,3).map((f,i) => {
        const ratio = i === 0 ? 50 : i === 1 ? 30 : 20;
        return {...f, ratio, invest: (investAmount * ratio / 100).toFixed(1)};
      });


      // Register charts with chart-manager
      window.__chartManager = window.__chartManager || new LongmaChartManager({cdnCheckTimeout:2000});

      // Returns bar chart
      window.__chartManager.register('fundReturnChart', {
        type: 'bar',
        selector: '#fundReturnChart',
        lazy: true,
        data: {
          labels: enriched.map(f => f.name.substring(0,6) + '...'),
          datasets: [
            {
              label: '近1年收益(%)',
              data: enriched.map(f => parseFloat(f.ret1y)),
              backgroundColor: enriched.map(f => parseFloat(f.ret1y) >= 0 ? 'rgba(16,185,129,0.8)' : 'rgba(239,68,68,0.8)'),
              borderRadius: 6,
            },
            {
              label: '近3年收益(%)',
              data: enriched.map(f => parseFloat(f.ret3y)),
              backgroundColor: enriched.map(f => parseFloat(f.ret3y) >= 0 ? 'rgba(37,99,235,0.8)' : 'rgba(239,68,68,0.8)'),
              borderRadius: 6,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } },
          scales: { y: { ticks: { callback: v => v + '%' }, grid: { color: 'rgba(0,0,0,0.04)' } } }
        }
      });

      // Risk-Return scatter (as bubble chart)
      window.__chartManager.register('fundRiskChart', {
        type: 'bubble',
        selector: '#fundRiskChart',
        lazy: true,
        data: {
          datasets: [{
            label: '基金',
            data: enriched.map(f => ({
              x: f.volatility,
              y: parseFloat(f.ret3y),
              r: Math.max(6, parseFloat(f.sharpe) * 4)
            })),
            backgroundColor: enriched.map((f, i) => {
              const colors = ['rgba(37,99,235,0.6)','rgba(16,185,129,0.6)','rgba(245,158,11,0.6)','rgba(139,92,246,0.6)','rgba(239,68,68,0.6)'];
              return colors[i % colors.length];
            }),
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const d = ctx.raw;
                  const fund = enriched[ctx.dataIndex];
                  return [fund.name.substring(0,8), `波动率:${d.x}%`, `收益:${d.y}%`, `夏普:${fund.sharpe}`];
                }
              }
            }
          },
          scales: {

<script>
document.addEventListener('DOMContentLoaded', async function() {
    if (typeof LongmaAPI === 'undefined') {
        console.warn('[FundCompare] LongmaAPI 未加载，跳过自动数据加载');
        return;
    }
    try {
        // 自动加载股票数据
        const stockContainer = document.querySelector('.stock-data, #stock-data, [data-type="stocks"]');
        if (stockContainer && LongmaAPI && LongmaAPI.stocks && LongmaAPI.stocks.list) {
            const result = await LongmaAPI.stocks.list();
            if (result.success && result.data) {
                renderStockList(stockContainer, result.data);
            }
        }

        // 自动加载基金数据
        const fundContainer = document.querySelector('.fund-data, #fund-data, [data-type="funds"]');
        if (fundContainer && LongmaAPI && LongmaAPI.funds && LongmaAPI.funds.get) {
            const result = await LongmaAPI.funds.get('110022');
            if (result.success && result.data) {
                renderFundCard(fundContainer, result.data);
            }
        }
    } catch (e) {
        console.warn('[FundCompare] 自动数据加载失败（非关键）:', e.message);
    }
});

function renderStockList(container, stocks) {
    let html = '<div class="api-stock-list">';
    stocks.forEach(stock => {
        const changeClass = stock.change >= 0 ? 'up' : 'down';
        const changeSign = stock.change >= 0 ? '+' : '';
        html += `<div class="api-stock-item ${changeClass}">
            <span class="code">${stock.code}</span>
            <span class="name">${stock.name}</span>
            <span class="price">¥${stock.price.toFixed(2)}</span>
            <span class="change">${changeSign}${(stock.change * 100).toFixed(2)}%</span>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function renderFundCard(container, fund) {
    container.innerHTML = `<div class="api-fund-card">
        <h4>${fund.name}</h4>
        <p>净值: ¥${fund.nav.toFixed(3)}</p>
        <p>日涨跌: ${fund.change > 0 ? '+' : ''}${(fund.change * 100).toFixed(2)}%</p>
        <p>风险等级: ${fund.risk}</p>
    </div>`;
}
</script>

    <script>
    (function(){
        if('IntersectionObserver' in window){
            var io=new IntersectionObserver(function(entries){
                entries.forEach(function(e){
                    if(e.isIntersecting){
                        var el=e.target;
                        var bg=el.getAttribute('data-bg');
                        if(bg){el.style.backgroundImage='url('+bg+')';el.removeAttribute('data-bg');}
                        io.unobserve(el);
                    }
                });
            },{rootMargin:'100px'});
            document.querySelectorAll('[data-bg]').forEach(function(el){io.observe(el);});
        }
    })();
    </script>
