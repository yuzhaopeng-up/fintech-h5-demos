        .header-icon {

            font-size: 24px; flex-shrink: 0;

        .header-info h1 { font-size: 18px; font-weight: 900; }
        .header-info p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .header-badge {
            background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700; margin-left: auto;
        }

        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .stat-card {
            background: rgba(255,255,255,0.15); border-radius: 14px;
            padding: 12px 8px; text-align: center;

        .stat-card .val { font-size: 22px; font-weight: 900; }
        .stat-card .lbl { font-size: 11px; opacity: 0.85; margin-top: 2px; }

        /* Content */
        .content { max-width: 720px; margin: 0 auto; padding: 16px 16px 100px; }

        /* Section */
        .section-title {
            font-size: 15px; font-weight: 700; margin-bottom: 12px;
            display: flex; align-items: center; gap: 6px;
        }
        .section-title::before {
            content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px;
        }

        /* Cards list */
        .card-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

        /* Credit card visual */
        .credit-card-visual {
            background: linear-gradient(135deg, #1E3A5F, #2563EB);
            border-radius: 20px; padding: 20px; color: white;
            min-height: 160px; display: flex; flex-direction: column;
            justify-content: space-between; position: relative; overflow: hidden;
            margin-bottom: 16px;
        }
        .credit-card-visual.diamond {
            background: linear-gradient(135deg, #4C1D95, #7C3AED);
        }
        .credit-card-visual.gold {
            background: linear-gradient(135deg, #92400E, #D97706);
        }
        .credit-card-visual.green {
            background: linear-gradient(135deg, #065F46, #10B981);
        }
        .credit-card-bg-circle {
            position: absolute; right: -30px; top: -30px;
            width: 180px; height: 180px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }
        .card-bank { font-size: 13px; font-weight: 600; opacity: 0.9; }
        .card-chip {
            width: 36px; height: 28px; background: linear-gradient(135deg, #D4A017, #FFD700);
            border-radius: 6px; margin: 12px 0;
        }
        .card-number {
            font-size: 16px; letter-spacing: 3px; font-weight: 600;
            font-family: 'Courier New', monospace;
        }
        .card-bottom {
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .card-holder { font-size: 11px; opacity: 0.8; }
        .card-holder-name { font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .card-level { font-size: 22px; font-weight: 900; opacity: 0.9; }

        /* Card info card */
        .card-item {
            background: var(--card); border-radius: var(--radius);
            padding: 16px; box-shadow: var(--shadow); cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 2px solid transparent;
        }
        .card-item:active { transform: scale(0.99); }
        .card-item.selected { border-color: var(--accent); background: #EEF2FF; }
        .card-item-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
        }
        .card-item-icon {
            width: 44px; height: 44px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
        }
        .card-item-info { flex: 1; }
        .card-item-name { font-size: 15px; font-weight: 800; }
        .card-item-level { font-size: 12px; color: var(--muted); }
        .card-item-check {
            width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 12px;
            color: white; font-weight: 900; flex-shrink: 0;

        .card-item-fees {

        .card-item-btns { display: flex; gap: 8px; }
        .card-btn {

            font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
        }
        .card-btn:active { opacity: 0.8; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: var(--bg); color: var(--accent); border: 1.5px solid var(--border); }

        /* Benefits */
        .benefits-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;

        .benefit-item {
            display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);

        .form-input:focus { border-color: var(--accent); }
        .form-select {
            width: 100%; border: 1.5px solid var(--border); border-radius: 12px;

            background: var(--card); cursor: pointer; font-family: inherit;

        .submit-btn {

        .submit-btn:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; }

        /* Chat section */
        .chat-section {
            background: var(--card); border-radius: var(--radius);
            padding: 16px; box-shadow: var(--shadow); margin-bottom: 16px;
        }
        .chat-list { max-height: 300px; overflow-y: auto; margin-bottom: 12px; }
        .msg { display: flex; gap: 10px; margin-bottom: 12px; }
        .msg.user { flex-direction: row-reverse; }
        .avatar {

        .bubble {

        .intent-tag {

        .qbtn {
            padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;

        .qbtn:active { transform: scale(0.96); }
        .qbtn:hover { border-color: var(--accent); color: var(--accent); background: #EEF2FF; }

        /* Tabs */
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700;
            white-space: nowrap; cursor: pointer; border: none;
            background: var(--card); color: var(--muted); box-shadow: var(--shadow);

        }
        .tab.active { background: var(--primary); color: white; }

        /* Info display */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px;
        }
        .info-item { background: var(--bg); border-radius: 12px; padding: 12px; }

        .info-item .val { font-size: 15px; font-weight: 800; }

        /* Toast */

        /* Footer */
        .footer { text-align: center; padding: 16px; font-size: 12px; color: var(--muted); }
    </style>

            { name: '龙青春卡', bank: 'FinAI银行', level: '普卡', levelIcon: '🎓', annualFee: 0, feeNote: '28岁以下免至毕业', maxPeriod: '48天', colorClass: 'green', bgColor: '#FCE7F3', textColor: '#BE185D', minIncome: 0, ageRange: [18,28], creditRange: [0.2,1.5], features: ['在校生专属', '毕业前免年费', '取现额度高'], benefits: ['在校生专属', '毕业前免年费', '生日月双倍'], suitable: ['在校大学生', '职场新人', '第一张卡'] },
        ];

        // ============ State ============
        var customer = { age: null, income: null, occupation: null, city: null };
        var selectedCardIdx = -1;
        var matchedCards = [];

        // ============ Init ============
        window.addEventListener('load', function() {
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {month:'short',day:'numeric'});
            renderCardList();
            populateCardSelect();
        });

        // ============ Tab switching ============
        window.switchTab = function(tab) {
            ['cards','apply','chat'].forEach(function(t) {
                var btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
                var sec = document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1));
                var active = t === tab;
                btn.classList.toggle('active', active);
                sec.style.display = active ? 'block' : 'none';
            });
        };

        // ============ Match cards ============
        function matchCards() {
            matchedCards = [];
            CARDS.forEach(function(card) {
                var score = 0;
                if (customer.age !== null && card.ageRange[0] <= customer.age && customer.age <= card.ageRange[1]) {
                    score += 30;
                }
                if (customer.income !== null && customer.income >= card.minIncome) {
                    score += 40;
                    if (customer.income >= card.minIncome * 2) score += 10;
                }
                if (customer.occupation === '企业主' && card.level === '钻石') score += 10;
                if (customer.occupation === '学生' && card.level === '普卡') score += 20;
                if (score > 0) matchedCards.push({card: card, score: score});
            });
            matchedCards.sort(function(a, b) { return b.score - a.score; });
            return matchedCards;
        }

        // ============ Render featured card ============
        function updateFeaturedCard(card) {
            var fc = document.getElementById('featuredCard');
            fc.className = 'credit-card-visual ' + (card.colorClass || '');
            document.getElementById('fcLevel').textContent = card.level + '卡';
        }

        // ============ Render card list ============
        function renderCardList() {
            var list = document.getElementById('cardList');
            var matches = matchCards();
            var cards = matches.length > 0 ? matches.map(function(m) { return m.card; }) : CARDS.slice(0, 3);

            // Update stats
            document.getElementById('statMatched').textContent = matches.length > 0 ? matches.length + '+' : CARDS.length;
            if (matches.length > 0 && matches[0].card.creditRange) {
                var topRange = matches[0].card.creditRange;
                document.getElementById('statQuota').textContent = topRange[0] + '-' + topRange[1] + '万';
            }

            if (matches.length === 0) {
                updateFeaturedCard(CARDS[1]); // default to platinum
            } else {
                updateFeaturedCard(matches[0].card);
            }

            var html = '';
            cards.forEach(function(card, idx) {
                var isSelected = selectedCardIdx === idx;
                html += '<div class="card-item' + (isSelected ? ' selected' : '') + '" onclick="selectCard(' + idx + ')">';
                html += '<div class="card-item-header">';
                html += '<div class="card-item-icon" style="background:' + card.bgColor + ';color:' + card.textColor + ';">' + card.levelIcon + '</div>';
                html += '<div class="card-item-info">';
                html += '<div class="card-item-name">' + card.name + '</div>';
                html += '<div class="card-item-level">' + card.bank + ' · ' + card.level + '</div>';
                html += '</div>';
                html += '<div class="card-item-check">' + (isSelected ? '✓' : '') + '</div>';
                html += '</div>';
                html += '<div class="card-item-fees">';
                html += '<span class="fee-tag">年费' + card.annualFee + '元</span>';
                html += '<span class="fee-tag">免息' + card.maxPeriod + '</span>';
                html += '<span class="fee-tag">额度' + card.creditRange[0] + '-' + card.creditRange[1] + '万</span>';
                html += '<span class="fee-tag">月收入' + (card.minIncome/1000) + 'K+</span>';
                html += '</div>';
                html += '<div class="benefits-grid">';
                card.features.forEach(function(f) {
                    html += '<div class="benefit-item"><div class="benefit-dot"></div>' + f + '</div>';
                });
                html += '</div>';
                html += '<div class="card-item-btns">';
                html += '<button class="card-btn btn-primary" onclick="event.stopPropagation();applyCard(' + idx + ')">立即申请</button>';
                html += '<button class="card-btn btn-outline" onclick="event.stopPropagation();showCardDetail(' + idx + ')">了解详情</button>';
                html += '</div></div>';
            });

            if (html === '') {
                html = '<div style="text-align:center;padding:32px;color:var(--muted);font-size:14px;">请先完善信息，系统将为您推荐最合适的卡片</div>';
            }
            list.innerHTML = html;
        }

        window.selectCard = function(idx) {
            selectedCardIdx = idx;
            var card = CARDS[idx];
            document.getElementById('formCard').value = card.name;
            renderCardList();
            updateFeaturedCard(card);
            showToast('已选择：' + card.name);
        };

        window.applyCard = function(idx) {
            selectedCardIdx = idx;
            var card = CARDS[idx];
            document.getElementById('formCard').value = card.name;
            switchTab('apply');
            document.getElementById('formCard').scrollIntoView({behavior: 'smooth'});
            showToast('即将申请：' + card.name);
        };

        window.showCardDetail = function(idx) {
            var card = CARDS[idx];
            var html = '<div style="padding:8px 0;">';
            html += '<div style="text-align:center;margin-bottom:16px;">';
            html += '<div style="font-size:40px;margin-bottom:8px;">' + card.levelIcon + '</div>';
            html += '<div style="font-size:20px;font-weight:900;">' + card.name + '</div>';
            html += '<div style="font-size:13px;color:var(--muted);">' + card.bank + ' · ' + card.level + '</div>';
            html += '</div>';
            html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;text-align:center;">';
            html += '<div style="background:var(--bg);padding:10px;border-radius:10px;"><div style="font-size:18px;font-weight:900;">' + card.annualFee + '元</div><div style="font-size:11px;color:var(--muted);">年费</div></div>';
            html += '<div style="background:var(--bg);padding:10px;border-radius:10px;"><div style="font-size:18px;font-weight:900;">' + card.maxPeriod + '</div><div style="font-size:11px;color:var(--muted);">免息期</div></div>';
            html += '<div style="background:var(--bg);padding:10px;border-radius:10px;"><div style="font-size:18px;font-weight:900;">' + card.creditRange[0] + '-' + card.creditRange[1] + '万</div><div style="font-size:11px;color:var(--muted);">额度</div></div>';
            html += '</div>';
            html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">✨ 核心权益</div>';
            card.benefits.forEach(function(b) { html += '<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);">' + b + '</div>'; });
            html += '</div>';
            alert(html);
        };

        // ============ Populate card select ============
        function populateCardSelect() {
            var sel = document.getElementById('formCard');
            CARDS.forEach(function(c) { sel.innerHTML += '<option value="' + c.name + '">' + c.name + ' · ' + c.level + '</option>'; });
        }

        // ============ Chat ============
        function parseCustomer(text) {
            var c = Object.assign({}, customer);

            // Age
            var ageMatch = text.match(/(\d{2})\s*岁/);
            if (ageMatch) c.age = parseInt(ageMatch[1]);

            // Income
            var incMatch = text.match(/(\d+(?:\.\d+)?)\s*万/);
            if (incMatch) c.income = parseFloat(incMatch[1]) * 10000;
            else {
                incMatch = text.match(/(\d+)\s*千/);
                if (incMatch) c.income = parseFloat(incMatch[1]) * 1000;
            }

            // Occupation
            if (/企业主|老板/.test(text)) c.occupation = '企业主';
            else if (/学生|在校/.test(text)) c.occupation = '学生';
            else if (/工薪|上班|打工/.test(text)) c.occupation = '工薪';
            else if (/自由职业/.test(text)) c.occupation = '自由职业';

            // City
            if (/北京|上海|广州|深圳/.test(text)) c.city = '一线';
            else if (/杭州|南京|成都|武汉/.test(text)) c.city = '二线';

            return c;
        }

        function updateCustInfo() {
            var c = customer;
            var setVal = function(id, val, unit) {
                var el = document.getElementById(id);
                el.textContent = val !== null ? (unit ? val + unit : val) : '—';
                el.className = 'val' + (val !== null ? '' : ' empty');
            };
            setVal('ciAge', c.age, '岁');
            setVal('ciIncome', c.income ? (c.income/10000).toFixed(1) + '万' : null);
            setVal('ciOcc', c.occupation);
            setVal('ciCity', c.city);

            // Progress
            var done = [c.age, c.income, c.occupation].filter(function(v) { return v !== null; }).length;
            document.getElementById('statProgress').textContent = done + '/5';

            // Re-match
            renderCardList();
        }

        function addMsg(html, isUser) {
            var list = document.getElementById('chatList');
            var div = document.createElement('div');
            div.className = 'msg ' + (isUser ? 'user' : 'bot');
            div.innerHTML = '<div class="avatar" style="background:' + (isUser ? '#DBEAFE' : '#F1F5F9') + ';">' + (isUser ? '👤' : '💳') + '</div>' +
                '<div class="bubble' + (isUser ? '' : '') + '">' + html + '</div>';
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        function generateChatResponse(text) {
            customer = parseCustomer(text);
            updateCustInfo();
            var matches = matchCards();
            var age = customer.age, income = customer.income;

            if (matches.length > 0) {
                var top = matches[0].card;
                var summary = '根据您的情况（' + (age ? age + '岁' : '') + (income ? '，月收入' + (income/10000).toFixed(1) + '万' : '') + '）\n\n';
                summary += '🎉 为您推荐 **' + top.name + '**\n';
                summary += '额度：' + top.creditRange[0] + '-' + top.creditRange[1] + '万 | 年费：' + top.annualFee + '元\n';
                summary += '核心权益：' + top.benefits[0] + '\n\n';
                if (matches.length > 1) {
                    summary += '备选：' + matches[1].card.name + '（额度' + matches[1].card.creditRange[0] + '-' + matches[1].card.creditRange[1] + '万）';
                }
                summary += '\n\n回复数字选择：1 - ' + top.name + ' / 2 - ' + (matches[1] ? matches[1].card.name : '暂无') + '\n或回复「申请」开始办理流程';
                return summary.replace(/\*\*/g, '');
            } else if (age && income) {
                return '根据您的信息（' + age + '岁，月收入' + (income/10000).toFixed(1) + '万），暂未匹配到符合条件的卡片。\n\n建议提升收入后再次申请，或联系客服咨询专属产品～';
            } else {
                var missing = [];
                if (!age) missing.push('年龄');
                if (!income) missing.push('月收入');
                return '还缺一些信息：' + missing.join('、') + '\n请补充告诉我～';
            }
        }

        window.sendQuick = function(text) {
            addMsg('<div style="font-size:15px;">' + text + '</div>', true);
            setTimeout(function() {
                addMsg(generateChatResponse(text).replace(/\n/g, '<br>'), false);
            }, 400);
        };

        window.sendChat = function() {
            var input = document.getElementById('chatInput');
            var text = input.value.trim();
            if (!text) return;
            input.value = '';
            addMsg('<div style="font-size:15px;">' + text + '</div>', true);
            setTimeout(function() {
                addMsg(generateChatResponse(text).replace(/\n/g, '<br>'), false);
            }, 400);
        };

        // ============ Form validation ============
        ['formName','formPhone','formId','formCard','formCity','formIncome'].forEach(function(id) {
            document.getElementById(id).addEventListener('input', checkForm);
            document.getElementById(id).addEventListener('change', checkForm);
        });

        function checkForm() {
            var name = document.getElementById('formName').value.trim();
            var phone = document.getElementById('formPhone').value.trim();
            var id = document.getElementById('formId').value.trim();
            var card = document.getElementById('formCard').value;
            var city = document.getElementById('formCity').value;
            var income = document.getElementById('formIncome').value;
            var ok = name.length >= 2 && phone.length === 11 && id.length === 18 && card && city && income;
            var btn = document.getElementById('submitBtn');
            btn.disabled = !ok;
            btn.textContent = ok ? '提交申请' : '请完善信息';
        }

        window.submitApply = function() {
            var name = document.getElementById('formName').value;
            var card = document.getElementById('formCard').value;
            showToast('✅ 申请已提交！预计1-3个工作日完成审核');
            // Reset form
            ['formName','formPhone','formId','formIncome'].forEach(function(id) {
                document.getElementById(id).value = '';
            });
            document.getElementById('formCard').value = '';
            document.getElementById('formCity').value = '';
            checkForm();
        };

        // ============ Toast ============
        window.showToast = function(msg) {
            var t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                t.style.transition = 'opacity 0.3s';
                setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 300);
            }, 2000);
        };
    })();
    </script>
</body>
</html>
