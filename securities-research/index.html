      <input type="number" id="investAmount" placeholder="投资金额（万）" value="100">
      <button class="run-btn" onclick="genPortfolio()">📈 生成配置方案</button>

<script>
(function(){
  const industries = {
    "新能源":{growth:"增速 25-30%",drivers:["碳中和政策","技术成本下降","储能需求增长"],risks:["原材料价格波动","补贴政策退坡","国际贸易摩擦"],companies:["宁德时代","隆基绿能","比亚迪","阳光电源"]},
    "半导体":{growth:"增速 15-20%",drivers:["国产替代","AI算力需求","汽车电子"],risks:["技术封锁","周期波动","产能过剩"],companies:["中芯国际","韦尔股份","兆易创新","北方华创"]},
    "医药":{growth:"增速 10-15%",drivers:["老龄化","创新药","医疗新基建"],risks:["集采降价","研发失败","监管趋严"],companies:["恒瑞医药","药明康德","迈瑞医疗","爱尔眼科"]},
    "消费":{growth:"增速 8-12%",drivers:["消费升级","国潮崛起","渠道变革"],risks:["消费疲软","竞争加剧","成本上升"],companies:["贵州茅台","海天味业","中国中免","美的集团"]},
    "银行":{growth:"增速 5-8%",drivers:["息差企稳","资产质量改善","财富管理转型"],risks:["经济下行","地产风险","利率市场化"],companies:["招商银行","宁波银行","BankD银行","兴业银行"]}
  };

  const funds = {
    "股票型":{risk:"高",ret:"预期 10-15%",suit:"积极型投资者"},
    "债券型":{risk:"低",ret:"预期 3-5%",suit:"保守型投资者"},
    "混合型":{risk:"中",ret:"预期 6-10%",suit:"平衡型投资者"},
    "指数型":{risk:"中高",ret:"预期 8-12%",suit:"定投投资者"},
    "QDII":{risk:"中高",ret:"预期 8-15%",suit:"全球配置投资者"},
    "FOF":{risk:"中",ret:"预期 5-8%",suit:"新手投资者"}
  };

  function cyrb128(str){
    let h1=1779033703,h2=3144134277,h3=1013904242,h4=2773480762;
    for(let i=0,k;i<str.length;i++){k=str.charCodeAt(i);h1=h2^Math.imul(h1^k,597399067);h2=h3^Math.imul(h2^k,2869860233);h3=h4^Math.imul(h3^k,951274213);h4=h1^Math.imul(h4^k,2716044179);}
    h1=Math.imul(h3^(h1>>>18),597399067);h2=Math.imul(h4^(h2>>>22),2869860233);h3=Math.imul(h1^(h3>>>17),951274213);h4=Math.imul(h2^(h4>>>19),2716044179);
    return [(h1^h2^h3^h4)>>>0,(h2^h1)>>>0,(h3^h1)>>>0,(h4^h1)>>>0];
  }
  function sfc32(a,b,c,d){return function(){a>>>=0;b>>>=0;c>>>=0;d>>>=0;let t=(a+b)|0;a=b^b>>>9;b=c+(c<<3)|0;c=(c<<21)|(c>>>11);d=d+1|0;t=t+d|0;c=c+t|0;return (t>>>0)/4294967296;};}
  function createRng(seed){ const s=cyrb128(seed); return sfc32(s[0],s[1],s[2],s[3]); }

  let selInd = null, selFund = null;

  function renderIndustries(){
    const grid = document.getElementById('indGrid');
    grid.innerHTML = Object.entries(industries).map(([name,data])=>`
      <div class="ind-card ${selInd===name?'active':''}" data-name="${name}" onclick="selectInd(this)">
        <div class="name">${name}</div>
        <div class="meta">${data.growth}</div>
      </div>
    `).join('');
  }
  function selectInd(el){ selInd = el.dataset.name; renderIndustries(); }
  window.selectInd = selectInd;

  function renderFunds(){
    const grid = document.getElementById('fundGrid');
    grid.innerHTML = Object.entries(funds).map(([name,data])=>`
      <div class="ind-card ${selFund===name?'active':''}" data-name="${name}" onclick="selectFund(this)">
        <div class="name">${name}</div>
        <div class="meta">${data.ret}</div>
      </div>
    `).join('');
  }
  function selectFund(el){ selFund = el.dataset.name; renderFunds(); }
  window.selectFund = selectFund;

  window.switchView = function(view){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById(view+'View').classList.add('active');
  };

  window.genIndustry = function(){
    const name = selInd || '新能源';
    document.getElementById('indLoading').classList.add('active');
    document.getElementById('indResult').classList.remove('active');
    setTimeout(()=>{
      const rng = createRng('ind_'+name+Date.now());
      const d = industries[name];
      const rand = ()=>rng();
      const score = Math.floor(rand()*30)+65;
      document.getElementById('indResult').innerHTML = `
        <div class="card">
          <h3>🏙️ ${name}行业研究观点</h3>
          <div class="metric-grid">
            <div class="metric"><b>${d.growth.replace('增速 ','')}</b><span>行业增速</span></div>
            <div class="metric"><b>${score}</b><span>景气度评分</span></div>
            <div class="metric"><b>${d.companies.length}</b><span>重点公司</span></div>
          </div>
          <div style="margin-top:14px;"><strong>驱动因素：</strong></div>
          <div>${d.drivers.map(x=>`<span class="driver-tag">${x}</span>`).join('')}</div>
          <div style="margin-top:10px;"><strong>风险因素：</strong></div>
          <div>${d.risks.map(x=>`<span class="risk-tag">${x}</span>`).join('')}</div>
          <div style="margin-top:10px;"><strong>重点公司：</strong></div>
          <div class="company-row">${d.companies.map(c=>`<span class="company-pill">${c}</span>`).join('')}</div>
          <div style="margin-top:12px;font-size:13px;color:var(--muted);line-height:1.7;">
            <strong>研究观点：</strong>${name}行业${score>=80?'处于高景气度区间，建议继续超配':score>=70?'景气度保持稳健，建议标配':'景气度有所回落，建议观察'}。
            ${d.drivers[0]}是核心驱动力，${d.risks[0]}需重点关注。
          </div>
        </div>`;
      document.getElementById('indLoading').classList.remove('active');
      document.getElementById('indResult').classList.add('active');
    },800);
  };

  window.genFund = function(){
    const name = selFund || '混合型';
    document.getElementById('fundLoading').classList.add('active');
    document.getElementById('fundResult').classList.remove('active');
    setTimeout(()=>{
      const d = funds[name];
      document.getElementById('fundResult').innerHTML = `
        <div class="card">
          <h3>📊 ${name}分析</h3>
          <div class="metric-grid">
            <div class="metric"><b>${d.risk}</b><span>风险等级</span></div>
            <div class="metric"><b>${d.ret.replace('预期 ','')}</b><span>预期收益</span></div>
            <div class="metric"><b>${d.suit}</b><span>适合人群</span></div>
          </div>
          <div style="margin-top:12px;font-size:13px;line-height:1.7;">
            <strong>产品特征：</strong>${name}适合${d.suit}，风险等级为${d.risk}，预期收益率${d.ret}。
            建议根据自身风险承受能力选择，定投可平滑波动。
          </div>
        </div>`;
      document.getElementById('fundLoading').classList.remove('active');
      document.getElementById('fundResult').classList.add('active');
    },600);
  };

  window.genPortfolio = function(){
    const profile = document.getElementById('riskProfile').value.trim() || '平衡型';
    const amount = parseFloat(document.getElementById('investAmount').value) || 100;
    document.getElementById('portLoading').classList.add('active');
    document.getElementById('portResult').classList.remove('active');
    setTimeout(()=>{
      const rng = createRng('port_'+profile+amount);
      const allocations = {
        '保守型':[{name:'货币基金',ratio:40,ret:'2.0%'},{name:'短债基金',ratio:40,ret:'3.5%'},{name:'定期理财',ratio:20,ret:'4.0%'}],
        '稳健型':[{name:'债券基金',ratio:50,ret:'4.0%'},{name:'固收+',ratio:30,ret:'5.0%'},{name:'指数基金',ratio:20,ret:'8.0%'}],
        '平衡型':[{name:'固收+',ratio:30,ret:'5.0%'},{name:'指数基金',ratio:40,ret:'8.0%'},{name:'混合基金',ratio:30,ret:'10.0%'}],
        '成长型':[{name:'指数基金',ratio:40,ret:'8.0%'},{name:'主题基金',ratio:40,ret:'12.0%'},{name:'QDII',ratio:20,ret:'10.0%'}],
        '积极型':[{name:'股票基金',ratio:50,ret:'14.0%'},{name:'主题基金',ratio:30,ret:'12.0%'},{name:'QDII',ratio:20,ret:'10.0%'}]
      };
      const alloc = allocations[profile] || allocations['平衡型'];
      const totalRet = (alloc.reduce((s,a)=>s+a.ratio/100*parseFloat(a.ret),0)).toFixed(2);
      document.getElementById('portResult').innerHTML = `
        <div class="card">
          <h3>📈 ${profile}组合配置方案</h3>
          <div style="font-size:14px;margin-bottom:10px;"><strong>投资金额：</strong>${amount}万元 | <strong>预估组合收益：</strong>${totalRet}%</div>
          ${alloc.map(a=>`
            <div style="display:flex;align-items:center;gap:10px;margin:8px 0;padding:10px;background:#f8fafc;border-radius:10px;">
              <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#06b6d4);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;">${a.ratio}%</div>
              <div style="flex:1;">
                <div style="font-weight:700;">${a.name}</div>
                <div style="font-size:12px;color:var(--muted);">预期收益 ${a.ret}</div>
              </div>
            </div>
          `).join('')}
          <div style="margin-top:10px;font-size:13px;color:var(--muted);line-height:1.7;">
            <strong>调仓建议：</strong>每季度评估一次组合表现，年度进行再平衡。
          </div>
        </div>`;
      document.getElementById('portLoading').classList.remove('active');
      document.getElementById('portResult').classList.add('active');
    },800);
  };

  renderIndustries(); renderFunds();
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    // 自动加载股票数据
    const stockContainer = document.querySelector('.stock-data, #stock-data, [data-type="stocks"]');
    if (stockContainer) {
        const result = await LongmaAPI.stocks.list();
        if (result.success && result.data) {
            renderStockList(stockContainer, result.data);
        }
    }
    
    // 自动加载基金数据
    const fundContainer = document.querySelector('.fund-data, #fund-data, [data-type="funds"]');
    if (fundContainer) {
        const result = await LongmaAPI.funds.get('110022');
        if (result.success && result.data) {
            renderFundCard(fundContainer, result.data);
        }
    }
});

function renderStockList(container, stocks) {
    let html = '<div class="api-stock-list">';
    stocks.forEach(stock => {
        const changeClass = stock.change >= 0 ? 'up' : 'down';
        const changeSign = stock.change >= 0 ? '+' : '';
        html += `<div class="api-stock-item ${changeClass}">
            <span class="code">${stock.code}</span>
            <span class="name">${stock.name}</span>
            <span class="price">¥${stock.price.toFixed(2)}</span>
            <span class="change">${changeSign}${(stock.change * 100).toFixed(2)}%</span>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function renderFundCard(container, fund) {
    container.innerHTML = `<div class="api-fund-card">
        <h4>${fund.name}</h4>
        <p>净值: ¥${fund.nav.toFixed(3)}</p>
        <p>日涨跌: ${fund.change > 0 ? '+' : ''}${(fund.change * 100).toFixed(2)}%</p>
        <p>风险等级: ${fund.risk}</p>
    </div>`;
}
</script>

    <script>
    (function(){
        if('IntersectionObserver' in window){
            var io=new IntersectionObserver(function(entries){
                entries.forEach(function(e){
                    if(e.isIntersecting){
                        var el=e.target;
                        var bg=el.getAttribute('data-bg');
                        if(bg){el.style.backgroundImage='url('+bg+')';el.removeAttribute('data-bg');}
                        io.unobserve(el);
                    }
                });
            },{rootMargin:'100px'});
            document.querySelectorAll('[data-bg]').forEach(function(el){io.observe(el);});
        }
    })();
    </script>
