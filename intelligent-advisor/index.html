<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能投顾</title>
<style>
body{font-family:system-ui,-apple-system,sans-serif;background:#f3f4f6;padding:16px;}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.btn{background:#2563eb;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;}
</style>
</head>
<body>
<div class="card">
<h1>🎯 智能投顾</h1>
<p>输入目标金额与风险偏好，获取AI推荐投资组合</p>
</div>
<div class="card">
<input type="number" placeholder="投资金额" style="width:100%;padding:12px;margin-bottom:12px;">
<select style="width:100%;padding:12px;margin-bottom:12px;">
<option>保守型</option><option>稳健型</option><option>成长型</option>
</select>
<button class="btn">获取投资建议</button>
</div>
</body>
</html>
