/* ===== 确定性数据生成器（与企微端保持一致的逻辑） ===== */
function stringHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}
function seededRand(seed, n, lo, hi) {
  return lo + Math.floor(Math.abs(Math.sin(seed * 9301 + n * 49297) * 1000000) % (hi - lo + 1));
}
function generateDeepData(company) {
  const seed = stringHash(company);
  const rand = (n, lo, hi) => seededRand(seed, n, lo, hi);

  const industryKeywords = {
    "制造业": ["集团","工业","电器","机械","智能","装备","汽车"],
    "科技互联网": ["科技","互联网","软件","信息","智能","云","数字"],
    "金融业": ["银行","证券","保险","基金","金融","投资"],
    "新能源": ["新能源","电池","光伏","储能","锂","电动"],
    "医药生物": ["医药","生物","制药","健康","医疗"],
    "房地产": ["地产","房地产","置业","建设","物业"],
    "零售消费": ["零售","商业","贸易","消费","电商","超市"]
  };
  let industry = "制造业";
  for (const [ind, kws] of Object.entries(industryKeywords)) {
    if (kws.some(k => company.includes(k))) { industry = ind; break; }
  }

/* ===== 版本对比 ===== */
function renderVersionComparison(data) {
  const wrap = document.getElementById('versionWrap');
  if(!wrap) return;
  // 模拟上次数据（基于当前数据偏移，保持确定性）
  const seed = stringHash(data.company);
  const lastScore = Math.max(20, Math.min(100, data.overallScore + (seed % 11 - 5)));
  const lastRisk = data.riskSignals.slice(0, Math.max(1, data.riskSignals.length - 1));
  const newRisk = data.riskSignals;
  const scoreDiff = data.overallScore - lastScore;
  const riskDiff = newRisk.length - lastRisk.length;

  const scoreClass = scoreDiff > 0 ? 'up' : scoreDiff < 0 ? 'down' : 'same';
  const scoreArrow = scoreDiff > 0 ? '↑' : scoreDiff < 0 ? '↓' : '—';
  const riskClass = riskDiff > 0 ? 'down' : riskDiff < 0 ? 'up' : 'same';
  const riskArrow = riskDiff > 0 ? '↑' : riskDiff < 0 ? '↓' : '—';

  wrap.innerHTML = `
    <div class="version-head">综合得分</div>
    <div class="version-row">
      <div class="version-cell"><div class="val">${lastScore}</div><div class="lbl">上次评分</div></div>
      <div class="version-cell ${scoreClass}"><div class="val">${data.overallScore} ${scoreArrow}${Math.abs(scoreDiff)}</div><div class="lbl">本次评分</div></div>
      <div class="version-cell"><div class="val">${scoreDiff > 0 ? '改善' : scoreDiff < 0 ? '下降' : '平稳'}</div><div class="lbl">变化趋势</div></div>
    </div>
    <div class="version-head" style="margin-top:8px">风险信号</div>
    <div class="version-row">
      <div class="version-cell"><div class="val">${lastRisk.length}项</div><div class="lbl">上次数量</div></div>
      <div class="version-cell ${riskClass}"><div class="val">${newRisk.length}项 ${riskArrow}${Math.abs(riskDiff)}</div><div class="lbl">本次数量</div></div>
      <div class="version-cell"><div class="val">${riskDiff > 0 ? '增加' : riskDiff < 0 ? '减少' : '平稳'}</div><div class="lbl">变化趋势</div></div>
    </div>
    <div style="margin-top:10px;padding:10px;background:#f8fafc;border-radius:10px;font-size:12px;color:var(--muted)">
      ℹ️ 上次分析时间: 30天前 · 主要变化: ${scoreDiff !== 0 || riskDiff !== 0 ? '评分' + (scoreDiff > 0 ? '上升' : scoreDiff < 0 ? '下降' : '平稳') + '，风险信号' + (riskDiff > 0 ? '增加' : riskDiff < 0 ? '减少' : '平稳') : '无显著变化'}。建议关注贪后指标变化。
    </div>
  `;
}

/* ===== 订阅监控 ===== */
function renderSubscription(data) {
  const wrap = document.getElementById('subWrap');
  if(!wrap) return;
  const subs = [
    {name:'财务指标变化',freq:'月度',status:data.overallScore >= 70 ? 'normal' : data.overallScore >= 60 ? 'warning' : 'alert'},
    {name:'风险信号扫描',freq:'半月',status:data.riskSignals.some(r=>r.level==='预警')?'warning':'normal'},
    {name:'应收账款监测',freq:'周度',status:data.fraudDetection.score >= 80 ? 'normal' : 'warning'},
    {name:'舆情/司法风险',freq:'实时',status:'normal'},
  ];
  const statusMap = {normal:{text:'正常',cls:'status-green'},warning:{text:'关注',cls:'status-yellow'},alert:{text:'预警',cls:'status-red'}};
  wrap.innerHTML = subs.map((s,i)=>{
    const st = statusMap[s.status];
    const subbed = localStorage.getItem('sub_'+data.company+'_'+i)==='1';
    return `<div class="sub-card"><div class="sub-info"><b>${s.name}</b><span style="font-size:11px;color:var(--muted)">监控频率: ${s.freq}</span></div><span class="sub-status ${st.cls}">${st.text}</span><button class="sub-btn ${subbed?'subbed':''}" onclick="toggleSub('${data.company}',${i},this)">${subbed?'已订阅':'订阅'}</button></div>`;
  }).join('') + `
    <div style="margin-top:10px;padding:10px;background:#f8fafc;border-radius:10px;font-size:12px;color:var(--muted)">
      ℹ️ 点击"订阅"按钮设置监控，当关键指标异常时将自动推送预警。数据保存在本地浏览器。
    </div>
  `;
}
function toggleSub(company, idx, btn) {
  const key = 'sub_' + company + '_' + idx;
  const isSubbed = localStorage.getItem(key) === '1';
  if(isSubbed) { localStorage.removeItem(key); btn.textContent = '订阅'; btn.classList.remove('subbed'); }
  else { localStorage.setItem(key, '1'); btn.textContent = '已订阅'; btn.classList.add('subbed'); }
}

  '默认': (d,q)=>`关于"${q}"，我的分析如下：<br>• 本企业综合得分${d.overallScore}分，风险等级${d.riskLevel}<br>• 建议${d.recommendation}<br>• 如需更深入分析，请参考以上各模块详情。`

function sendAgentQuestion() {
  const input = document.getElementById('agentInput');
  const chat = document.getElementById('agentChat');
  const q = input.value.trim();
  if(!q) return;
  const company = document.getElementById('companyInput').value.trim() || '目标企业';
  const data = generateDeepData(company);
  chat.innerHTML += `<div class="agent-msg q">${q}</div>`;
  let a = agentAnswers['默认'](data, q);
  if(q.includes('风险')) a = agentAnswers['风险'](data);
  else if(q.includes('均值') || q.includes('行业') || q.includes('排名')) a = agentAnswers['均值'](data);
  else if(q.includes('毛利') || q.includes('原材料') || q.includes('涨价')) a = agentAnswers['毛利'](data);
  setTimeout(()=>{ chat.innerHTML += `<div class="agent-msg a">${a}</div>`; chat.scrollTop = chat.scrollHeight; }, 400);
  input.value = '';
}

/* ===== ESG风险扫描渲染 ===== */
function renderESG(data) {
  const wrap = document.getElementById('esgWrap');
  if(!wrap || !data.esgData) return;
  const e = data.esgData;
  const circumference = 2 * Math.PI * 26;
  const offset = circumference - (e.overall/100) * circumference;

  const dimColor = (s) => s>=80?'#10b981':s>=60?'#3b82f6':'#ef4444';
  const dimLabel = (s) => s>=80?'优秀':s>=60?'良好':'关注';

  const renderItems = (items) => items.map(item => {
    const barColor = item.risk === '预警' ? '#ef4444' : item.risk === '关注' ? '#f59e0b' : '#10b981';
    const tagClass = item.risk === '预警' ? 'tag-red-esg' : item.risk === '关注' ? 'tag-yellow-esg' : 'tag-green-esg';
    const valNum = typeof item.value === 'number' ? item.value : 0;
    return `<div class="esg-item">
      <span style="min-width:90px;font-size:11px">${item.name}</span>
      <div class="esg-bar"><div class="esg-bar-inner" style="width:${valNum}%;background:${barColor}"></div></div>
      <span style="min-width:50px;text-align:right;font-size:11px;font-weight:600">${item.value}</span>
      <span class="tag ${tagClass}">${item.risk || '正常'}</span>
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="esg-top">
      <div class="esg-ring"><svg width="60" height="60"><circle cx="30" cy="30" r="26" stroke="#e2e8f0" stroke-width="5" fill="none"/><circle cx="30" cy="30" r="26" stroke="${e.color}" stroke-width="5" fill="none" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg><div style="position:absolute;text-align:center"><div class="esg-num" style="color:${e.color}">${e.overall}</div><div class="esg-label">ESG</div></div></div>
      <div class="esg-info">
        <h4>ESG综合评级：${e.level}</h4>
        <p>基于环境、社会、治理三维度的综合评估，反映企业可持续发展能力与长期风险。</p>
      </div>
    </div>
    <div class="esg-dims">
      <div class="esg-dim"><div class="score" style="color:${dimColor(e.environment.score)}">${e.environment.score}</div><div class="lbl">环境(E)</div><div class="sub">${dimLabel(e.environment.score)}</div></div>
      <div class="esg-dim"><div class="score" style="color:${dimColor(e.social.score)}">${e.social.score}</div><div class="lbl">社会(S)</div><div class="sub">${dimLabel(e.social.score)}</div></div>
      <div class="esg-dim"><div class="score" style="color:${dimColor(e.governance.score)}">${e.governance.score}</div><div class="lbl">治理(G)</div><div class="sub">${dimLabel(e.governance.score)}</div></div>
    </div>
    <div style="margin-top:14px">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">🌱 环境维度</div>
      <div class="esg-detail">${renderItems(e.environment.items)}</div>
    </div>
    <div style="margin-top:10px">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">🤝 社会维度</div>
      <div class="esg-detail">${renderItems(e.social.items)}</div>
    </div>
    <div style="margin-top:10px">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">⚖️ 治理维度</div>
      <div class="esg-detail">${renderItems(e.governance.items)}</div>
    </div>
    <div style="margin-top:10px;padding:10px;background:#f8fafc;border-radius:10px;font-size:12px;color:var(--muted)">
      ℹ️ ESG评级说明：≥80分为A级（优秀），60-79分为B级（良好），<60分为C级（关注）。以上数据仅为示例模拟，实际投资决策请结合第三方ESG评级报告。
    </div>
  `;
}

/* ===== 跨期趋势 Canvas 绘图 ===== */
function drawTrendChart(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const pad = {top:20,right:20,bottom:30,left:45};
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#f8fafc'; ctx.fillRect(0,0,w,h);

  const years = data.map(d=>d.year);
  const revs = data.map(d=>d.revenue);
  const margins = data.map(d=>d.margin);
  const roes = data.map(d=>d.roe);

  const maxRev = Math.max(...revs)*1.1;
  const maxMargin = Math.max(...margins, ...roes)*1.2;

  // 网格
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y = pad.top + ch*i/4;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(w-pad.right,y); ctx.stroke();
  }

  // 轴标签
  ctx.fillStyle='#64748b'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  years.forEach((y,i)=>{
    const x = pad.left + cw*i/(years.length-1);
    ctx.fillText(y, x, h-8);
  });

  // 左Y轴（营收）
  ctx.fillStyle='#2563eb'; ctx.textAlign='right'; ctx.font='10px sans-serif';
  for(let i=0;i<=4;i++){
    const v = Math.round(maxRev*i/4);
    ctx.fillText(v, pad.left-4, pad.top + ch*(1-i/4)+3);
  }

  // 右Y轴（百分比）
  ctx.fillStyle='#64748b'; ctx.textAlign='left';
  for(let i=0;i<=4;i++){
    const v = Math.round(maxMargin*i/4);
    ctx.fillText(v+'%', w-pad.right+4, pad.top + ch*(1-i/4)+3);
  }

  function drawLine(vals, color, max, width=2){
    ctx.strokeStyle=color; ctx.lineWidth=width; ctx.beginPath();
    vals.forEach((v,i)=>{
      const x = pad.left + cw*i/(years.length-1);
      const y = pad.top + ch*(1 - v/max);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    vals.forEach((v,i)=>{
      const x = pad.left + cw*i/(years.length-1);
      const y = pad.top + ch*(1 - v/max);
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    });
  }

  drawLine(revs, '#2563eb', maxRev);
  drawLine(margins, '#10b981', maxMargin);
  drawLine(roes, '#f59e0b', maxMargin);
}

/* ===== 压力测试交互 ===== */
function updateStress(id, baseScore) {
  const wrap = document.getElementById(id);
  if(!wrap) return;
  const rate = parseInt(wrap.querySelector('.s-rate').value);
  const rev = parseInt(wrap.querySelector('.s-rev').value);
  const ar = parseInt(wrap.querySelector('.s-ar').value);

  wrap.querySelector('.s-rate').nextElementSibling.textContent = rate+'bp';
  wrap.querySelector('.s-rev').nextElementSibling.textContent = rev+'%';
  wrap.querySelector('.s-ar').nextElementSibling.textContent = ar+'%';

  // 简化计算: 利率上行减少得分, 营收下滑减少得分, 坏账率减少得分
  const scoreDelta = -Math.round(rate*0.03) - Math.round(rev*0.4) - Math.round(ar*1.5);
  const newScore = Math.max(20, Math.min(100, baseScore + scoreDelta));
  const debtDelta = -Math.round(rate*0.05) - Math.round(rev*0.3);
  const newDebt = Math.max(20, Math.min(100, Math.round(baseScore*0.8) + debtDelta));
  const liqDelta = -Math.round(rev*0.2) - Math.round(ar*2);
  const newLiq = Math.max(20, Math.min(100, Math.round(baseScore*0.9) + liqDelta));

  const scoreEl = wrap.querySelector('.stress-score');
  scoreEl.textContent = newScore;
  scoreEl.className = 'num stress-score ' + (scoreDelta>=-5?'up':'down');

  const debtEl = wrap.querySelector('.stress-debt');
  debtEl.textContent = newDebt;
  debtEl.className = 'num stress-debt ' + (debtDelta>=-5?'up':'down');

  const liqEl = wrap.querySelector('.stress-liq');
  liqEl.textContent = newLiq;
  liqEl.className = 'num stress-liq ' + (liqDelta>=-5?'up':'down');

  const insightEl = wrap.querySelector('.stress-insight');
  if(newScore < 60) {
    insightEl.innerHTML = '🚨 <b>高风险警报</b>：极端情景下综合得分已降至'+newScore+'分，<strong>建议立即缩减授信额度并追加担保</strong>。';
    insightEl.style.background = '#fef2f2'; insightEl.style.color = '#991b1b';
  } else if(newScore < 70) {
    insightEl.innerHTML = '⚠️ <b>风险提示</b>：综合得分降至'+newScore+'分，建议审调提款条件并加强贷后监控。';
    insightEl.style.background = '#fffbeb'; insightEl.style.color = '#92400e';
  } else {
    insightEl.innerHTML = 'ℹ️ 调节上方滑块模拟极端情景，观察企业生存能力变化。当综合得分<60时建议缩减额度并追加担保。';
    insightEl.style.background = '#f8fafc'; insightEl.style.color = 'var(--muted)';
  }
}

function renderStockList(container, stocks) {
    let html = '<div class="api-stock-list">';
    stocks.forEach(stock => {
        const changeClass = stock.change >= 0 ? 'up' : 'down';
        const changeSign = stock.change >= 0 ? '+' : '';
        html += `<div class="api-stock-item ${changeClass}">
            <span class="code">${stock.code}</span>
            <span class="name">${stock.name}</span>
            <span class="price">¥${stock.price.toFixed(2)}</span>
            <span class="change">${changeSign}${(stock.change * 100).toFixed(2)}%</span>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function renderFundCard(container, fund) {
    container.innerHTML = `<div class="api-fund-card">
        <h4>${fund.name}</h4>
        <p>净值: ¥${fund.nav.toFixed(3)}</p>
        <p>日涨跌: ${fund.change > 0 ? '+' : ''}${(fund.change * 100).toFixed(2)}%</p>
        <p>风险等级: ${fund.risk}</p>
    </div>`;
}
</script>
