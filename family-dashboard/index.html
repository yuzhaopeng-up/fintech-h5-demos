    :root { --primary:#2563eb; --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --muted:#64748b; --bg:#f1f5f9; --card:#fff; --border:#e2e8f0; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:#0f172a; line-height:1.6; min-height:100vh; }
    .wrap { max-width:720px; margin:0 auto; padding:16px; }
    .hero { background:linear-gradient(135deg,#0ea5e9,#3b82f6); color:#fff; border-radius:24px; padding:28px 22px; box-shadow:0 14px 44px rgba(59,130,246,.18); }
    .hero h1 { font-size:24px; font-weight:900; margin-bottom:4px; }
    .hero .sub { opacity:.85; font-size:13px; }
    .section-title { font-size:18px; font-weight:900; margin:28px 0 14px; display:flex; align-items:center; gap:8px; }
    .section-title .dot { width:8px; height:8px; border-radius:50%; background:var(--primary); }
    .card { background:var(--card); border-radius:20px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.08),0 8px 24px rgba(15,23,42,.06); margin-bottom:12px; }
    .card h3 { font-size:16px; margin-bottom:10px; }
    .input-box { background:var(--card); border-radius:16px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.08),0 8px 24px rgba(15,23,42,.06); }
    .input-box input, .input-box select { width:100%; border:1px solid var(--border); border-radius:12px; padding:12px 14px; font-size:15px; outline:none; margin-bottom:10px; }
    .run-btn { width:100%; border:none; background:linear-gradient(135deg,#0ea5e9,#3b82f6); color:#fff; padding:14px; border-radius:14px; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 4px 16px rgba(59,130,246,.3); }
    .run-btn:disabled { opacity:.6; }
    .loading { display:none; text-align:center; padding:40px; }
    .loading.active { display:block; }
    .spinner { width:48px; height:48px; border:4px solid rgba(59,130,246,.15); border-top-color:#3b82f6; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .result { display:none; }
    .result.active { display:block; animation:fadeIn .5s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
    .ring-wrap { display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:wrap; }
    .ring { position:relative; width:140px; height:140px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .ring::before { content:""; position:absolute; width:110px; height:110px; border-radius:50%; background:#fff; }
    .ring-text { position:relative; z-index:1; text-align:center; }
    .ring-text .num { font-size:32px; font-weight:800; }
    .ring-text .label { font-size:12px; color:var(--muted); }
    .score-details { flex:1; min-width:180px; }
    .score-row { display:flex; justify-content:space-between; padding:6px 0; font-size:13px; border-bottom:1px solid var(--border); }
    .score-row:last-child { border-bottom:none; }
    .metric-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .metric-box { padding:14px; border-radius:12px; text-align:center; background:linear-gradient(135deg,#eff6ff,#dbeafe); }
    .metric-box.danger { background:linear-gradient(135deg,#fef2f2,#fee2e2); }
    .metric-box.warning { background:linear-gradient(135deg,#fffbeb,#fef3c7); }
    .metric-box.success { background:linear-gradient(135deg,#f0fdf4,#dcfce7); }
    .metric-box .num { font-size:22px; font-weight:800; color:var(--primary); }
    .metric-box.danger .num { color:var(--danger); }
    .metric-box.warning .num { color:#b45309; }
    .metric-box.success .num { color:var(--success); }
    .metric-box .lbl { font-size:11px; color:var(--muted); margin-top:4px; }
    .bar-wrap { margin-bottom:10px; }
    .bar-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
    .bar-bg { height:10px; background:var(--border); border-radius:5px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:5px; transition:width .8s ease; }

<div class="wrap">
  <div class="hero">
    <h1>🏠 家庭财务全景看板</h1>
    <div class="sub">家庭财务一张图 · 资产负债 · 保障缺口 · 养老规划 · 健康评分</div>
  </div>

  <div class="section-title"><span class="dot"></span>输入家庭信息</div>
  <div class="input-box">
    <input type="text" id="name" placeholder="户主姓名" value="">
    <input type="number" id="age" placeholder="户主年龄" value="35">
    <input type="number" id="income" placeholder="家庭年收入（万元）" value="30">
    <select id="familyType">
      <option value="single">单身</option>
      <option value="couple" selected>夫妻二人</option>
      <option value="child">有子女</option>
      <option value="elder">赡养老人</option>
    </select>
    <input type="number" id="assets" placeholder="总资产（万元）" value="283">
    <input type="number" id="liabilities" placeholder="总负债（万元）" value="97">
    <input type="number" id="ci" placeholder="重疾险已投保额度（万）" value="50">
    <input type="number" id="life" placeholder="定期寿险已投保额度（万）" value="100">
    <button class="run-btn" id="runBtn" onclick="genDashboard()">🏠 生成家庭财务看板</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><p>正在分析家庭财务状况...</p></div>

  <div class="result" id="result"></div>

  <a class="back-home" href="../experience-center.html">← 返回H5体验中心</a>
</div>

<script>
(function(){
  window.genDashboard = function(){
    const name = document.getElementById('name').value.trim() || '客户';
    const age = parseInt(document.getElementById('age').value) || 35;
    const income = parseFloat(document.getElementById('income').value) || 30;
    const familyType = document.getElementById('familyType').value;
    const assets = parseFloat(document.getElementById('assets').value) || 283;
    const liabilities = parseFloat(document.getElementById('liabilities').value) || 97;
    const ci = parseFloat(document.getElementById('ci').value) || 50;
    const life = parseFloat(document.getElementById('life').value) || 100;

    document.getElementById('loading').classList.add('active');
    document.getElementById('result').classList.remove('active');
    document.getElementById('runBtn').disabled = true;

    setTimeout(()=>{
      const netWorth = assets - liabilities;
      const debtRatio = liabilities / assets;
      const savingsRate = (income * 0.3) / income;

      // 保障需求计算
      const ciNeed = income * 3;
      const lifeNeed = liabilities + income * 10;
      const ciGap = Math.max(0, ciNeed - ci);
      const lifeGap = Math.max(0, lifeNeed - life);
      const protectionRatio = (ci + life) / (ciNeed + lifeNeed);

      // 养老缺口
      const retireAge = 60;
      const yearsToRetire = Math.max(1, retireAge - age);
      const pensionNeed = income * 0.7 * 25;
      const pensionValue = income * 0.15 * yearsToRetire;
      const pensionShortfall = Math.max(0, pensionNeed - pensionValue);
      const pensionGapAnnual = pensionShortfall / yearsToRetire;

      // 健康评分
      let score = 60;
      if(debtRatio < 0.3) score += 10;
      else if(debtRatio < 0.5) score += 5;
      else score -= 5;

      if(protectionRatio >= 0.8) score += 10;
      else if(protectionRatio >= 0.5) score += 5;
      else score -= 5;

      if(pensionShortfall === 0) score += 10;
      else if(pensionShortfall < pensionNeed * 0.3) score += 5;
      else score -= 5;

      if(savingsRate >= 0.3) score += 5;
      score = Math.min(100, Math.max(0, score));

      const grade = score>=90?'A':score>=75?'B':score>=60?'C':'D';
      const gradeText = score>=90?'优秀':score>=75?'良好':score>=60?'一般':'待改善';
      const color = score>=90?'#10b981':score>=75?'#3b82f6':score>=60?'#f59e0b':'#ef4444';

      // 建议
      const suggestions = [];
      if(ciGap > 0) suggestions.push({text:`${name}家庭重疾险保障缺口${ciGap.toFixed(0)}万元，建议补充重疾险保障覆盖3年家庭收入。`,level:'warning'});
      if(lifeGap > 0) suggestions.push({text:`${name}家庭定期寿险保障缺口${lifeGap.toFixed(0)}万元，建议补充以覆盖贷款和10年家庭责任。`,level:'danger'});
      if(pensionShortfall > 0) suggestions.push({text:`预估退休后养老金缺口${pensionShortfall.toFixed(1)}万元，建议每年存${pensionGapAnnual.toFixed(1)}万元以上。`,level:'danger'});
      if(debtRatio > 0.5) suggestions.push({text:`家庭负债率${(debtRatio*100).toFixed(0)}%偏高，建议优先偿还高息债务。`,level:'warning'});
      if(suggestions.length === 0) suggestions.push({text:`${name}家庭财务状况良好，继续保持当前的储蓄与保障策略。`,level:'success'});

      document.getElementById('result').innerHTML = `
        <div class="card">
          <h3>🏠 ${name}家庭财务全景</h3>
          <p style="font-size:12px;color:var(--muted);margin-bottom:12px">${name} | ${age}岁 | 家庭年收入${income}万 | ${new Date().toLocaleDateString()}</p>
          <div class="ring-wrap">
            <div class="ring" style="background:conic-gradient(${color} ${score*3.6}deg, var(--border) 0deg);">
              <div class="ring-text">
                <div class="num" style="color:${color}">${score}</div>
                <div class="label">财务健康分</div>
              </div>
            </div>
            <div class="score-details">
              <div class="score-row"><span>评级</span><span style="font-weight:700;color:${color}">${grade} (${gradeText})</span></div>
              <div class="score-row"><span>负债率</span><span style="font-weight:700">${(debtRatio*100).toFixed(0)}%</span></div>
              <div class="score-row"><span>保障覆盖</span><span style="font-weight:700">${(protectionRatio*100).toFixed(0)}%</span></div>
              <div class="score-row"><span>储蓄率</span><span style="font-weight:700">${(savingsRate*100).toFixed(0)}%</span></div>
              <div class="score-row"><span>养老准备度</span><span style="font-weight:700">${((1-pensionShortfall/pensionNeed)*100).toFixed(0)}%</span></div>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>💰 资产与负债</h3>
          <div class="metric-grid">
            <div class="metric-box success"><div class="num">${assets.toFixed(0)}</div><div class="lbl">总资产(万)</div></div>
            <div class="metric-box danger"><div class="num">${liabilities.toFixed(0)}</div><div class="lbl">总负债(万)</div></div>
            <div class="metric-box" style="background:linear-gradient(135deg,#f0f9ff,#e0f2fe)"><div class="num" style="color:#0284c7">${netWorth.toFixed(0)}</div><div class="lbl">净资产(万)</div></div>
            <div class="metric-box ${debtRatio>0.5?'danger':'warning'}"><div class="num">${(debtRatio*100).toFixed(0)}%</div><div class="lbl">负债率</div></div>
          </div>
        </div>

        <div class="card">
          <h3>🛡️ 保障缺口</h3>
          <div class="bar-wrap">
            <div class="bar-label"><span>重疾险</span><span style="color:${ciGap>0?'#ef4444':'#10b981'};font-weight:700">${ci}万 / ${ciNeed.toFixed(0)}万 ${ciGap>0?'(缺'+ciGap.toFixed(0)+')':'✓'}</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,ci/ciNeed*100)}%;background:${ciGap>0?'var(--warning)':'var(--success)'}"></div></div>
          </div>
          <div class="bar-wrap">
            <div class="bar-label"><span>定期寿险</span><span style="color:${lifeGap>0?'#ef4444':'#10b981'};font-weight:700">${life}万 / ${lifeNeed.toFixed(0)}万 ${lifeGap>0?'(缺'+lifeGap.toFixed(0)+')':'✓'}</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,life/lifeNeed*100)}%;background:${lifeGap>0?'var(--danger)':'var(--success)'}"></div></div>
          </div>
        </div>

        <div class="card">
          <h3>🏠 养老规划</h3>
          <div class="metric-grid">
            <div class="metric-box warning"><div class="num">${pensionGapAnnual.toFixed(1)}</div><div class="lbl">年度养老缺口(万)</div></div>
            <div class="metric-box danger"><div class="num">${pensionShortfall.toFixed(1)}</div><div class="lbl">退休后总缺口(万)</div></div>
            <div class="metric-box success"><div class="num">${pensionValue.toFixed(1)}</div><div class="lbl">预计累计(万)</div></div>
            <div class="metric-box"><div class="num">${yearsToRetire}</div><div class="lbl">距退休年数</div></div>
          </div>
        </div>

        <div class="card">
          <h3>💡 优化建议</h3>
          ${suggestions.map(s=>`<div class="suggestion ${s.level}">${s.text}</div>`).join('')}
        </div>`;

      document.getElementById('loading').classList.remove('active');
      document.getElementById('result').classList.add('active');
      document.getElementById('runBtn').disabled = false;
    },800);
  };
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    const profileContainer = document.querySelector('.customer-profile, #customer-profile, [data-type="customer"]');
    if (profileContainer) {
        const result = await LongmaAPI.customer.getProfile('C001');
        if (result.success && result.data) {
            renderCustomerProfile(profileContainer, result.data);
        }
    }
    
    const recContainer = document.querySelector('.recommendations, #recommendations, [data-type="recommendations"]');
    if (recContainer) {
        const result = await LongmaAPI.customer.getRecommendations('C001');
        if (result.success && result.data) {
            renderRecommendations(recContainer, result.data);
        }
    }
});

function renderCustomerProfile(container, data) {
    let html = `<div class="api-profile-card">
        <h3>${data.name} (ID: ${data.customer_id})</h3>
        <p>年龄: ${data.age}岁 | 风险偏好: ${data.risk_preference}</p>
        <p>总资产: ${LongmaAPI.utils.formatMoney(data.assets)}</p>
        <div class="api-holdings"><h4>持仓分布</h4>`;
    data.holdings.forEach(h => {
        html += `<div class="api-holding-item">
            <span>${h.type}</span>
            <span>${LongmaAPI.utils.formatMoney(h.amount)}</span>
            <span>${(h.ratio * 100).toFixed(1)}%</span>
        </div>`;
    });
    html += '</div></div>';
    container.innerHTML = html;
}

function renderRecommendations(container, data) {
    let html = '<div class="api-recommendations"><h4>产品推荐</h4>';
    data.products.forEach(p => {
        html += `<div class="api-product-card">
            <span class="name">${p.name}</span>
            <span class="type">${p.type}</span>
            <span class="match">匹配度: ${p.match}%</span>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}
</script>

    <script>
    (function(){
        if('IntersectionObserver' in window){
            var io=new IntersectionObserver(function(entries){
                entries.forEach(function(e){
                    if(e.isIntersecting){
                        var el=e.target;
                        var bg=el.getAttribute('data-bg');
                        if(bg){el.style.backgroundImage='url('+bg+')';el.removeAttribute('data-bg');}
                        io.unobserve(el);
                    }
                });
            },{rootMargin:'100px'});
            document.querySelectorAll('[data-bg]').forEach(function(el){io.observe(el);});
        }
    })();
    </script>
