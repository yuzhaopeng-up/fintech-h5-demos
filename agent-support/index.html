<script>
(function(){
  let selectedScenario = 'training';
  function selectScenario(el){
    document.querySelectorAll('.scenario-card').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    selectedScenario = el.dataset.scenario;
  }
  window.selectScenario = selectScenario;

  function cyrb128(str){
    let h1=1779033703,h2=3144134277,h3=1013904242,h4=2773480762;
    for(let i=0,k;i<str.length;i++){
      k=str.charCodeAt(i);
      h1=h2^Math.imul(h1^k,597399067);
      h2=h3^Math.imul(h2^k,2869860233);
      h3=h4^Math.imul(h3^k,951274213);
      h4=h1^Math.imul(h4^k,2716044179);
    }
    h1=Math.imul(h3^(h1>>>18),597399067);
    h2=Math.imul(h4^(h2>>>22),2869860233);
    h3=Math.imul(h1^(h3>>>17),951274213);
    h4=Math.imul(h2^(h4>>>19),2716044179);
    return [(h1^h2^h3^h4)>>>0,(h2^h1)>>>0,(h3^h1)>>>0,(h4^h1)>>>0];
  }
  function sfc32(a,b,c,d){
    return function(){
      a>>>=0;b>>>=0;c>>>=0;d>>>=0;
      let t=(a+b)|0;
      a=b^b>>>9;
      b=c+(c<<3)|0;
      c=(c<<21)|(c>>>11);
      d=d+1|0;
      t=t+d|0;
      c=c+t|0;
      return (t>>>0)/4294967296;
    };
  }
  function createRng(seed){ const s=cyrb128(seed); return sfc32(s[0],s[1],s[2],s[3]); }

  const knowledge = {
    training: {
      title:'培训材料：KYC面谈技巧',
      content:`KYC（Know Your Customer）是保险销售的基础。\n\n**面谈四步法：**\n1. 破冰建立信任（5-10分钟）\n2. 需求挖掘（SPIN提问法）\n3. 方案呈现（先讲理念，再讲产品）\n4. 促成与异议处理`,
      points:['SPIN提问法','先理念后产品','二选一促单'],
      compliance:['不得夸大收益','不得证毁同业','必须录音录像']
    },
    communication: {
      title:'沟通脚本：客户说"保险是骗人的"',
      opening:'我完全理解您的顾虑。确实有一些人对保险有不好的印象。',
      probing:['您是不是身边有人理赔不顺利？','还是对保险代理人有些不愉快的经历？'],
      presentation:`保险本身是法律保障的金融工具，理赔依据的是合同条款。\n\n理赔纠纷的主要原因：\n1. 投保时未如实告知健康状况（80%纠纷来源于此）\n2. 对保险责任有误解\n3. 未达到理赔标凅`,
      closing:'保险不是骗人的，骗人是那些不专业的销售行为。我们可以把您关心的条款一条一条解释清楚。'
    },
    product: {
      title:'产品知识：重疾险',
      highlights:['确诊即赔','一次性给付','弥补收入损失','覆盖康复费用'],
      targets:['家庭经济支柱','有房贷人群','996上班族'],
      objections:{'理赔难':'重疾险确诊即赔，合同条款明确，我司理赔时效行业领先（平均2.3天）','保费贵':'重疾险越早买越便宜，30岁买50万保额年缴仅8000左右，50岁买要翻倍'},
      compliance:['不得承诺理赔结果','不得夸大疾病定义范围','必须说明等待期']
    },
    compliance: {
      title:'合规警示：返佣',
      level:'严重违规',
      law:'《保险法》第116条、第131条',
      consequence:'罚款（最高30万）、吊销执照、行业禁入',
      correct:'用专业服务价值赢得客户，不承诺任何合同外利益',
      script:'我们的服务是专业咨询和长期陪伴，而不是一次性交易。返佣是违法的，我不能做'
    },
    objection: {
      title:'异议处理：客户说"考虑考虑"',
      opening:'当然，买保险是重要决定，确实需要考虑。',
      probing:['您主要考虑的是哪方面？是产品、公司，还是保费？','您大概想考虑多久？我可以帮您准备对比材料'],
      presentation:`建议您考虑这3个问题：\n1. 您担心的风险是什么？\n2. 如果不配置保险，您现在的方案是什么？\n3. 考虑的这段时间内，万一发生风险，家庭能否承受？`,
      closing:'我给您准备一份对比方案，您周末前给我答复就好，不急。'
    },
    faq: {
      title:'通用FAQ',
      items:[
        {q:'犹豫期是什么？',a:'犹豫期是投保后15天内，可以无条件退保，全额退还保费（仅扣10元工本费）。'},
        {q:'宽限期是什么？',a:'宽限期是缴费日之后60天，宽限期内保障仍然有效，但出险需补缴保费。'},
        {q:'等待期是什么？',a:'等待期内非意外出险，保险公司不赔。重疾通常90-180天，医疗30-90天。'}
      ]
    }
  };

  function generateResponse(){
    const query = document.getElementById('queryInput').value.trim() || selectedScenario;
    document.getElementById('loading').classList.add('active');
    document.getElementById('result').classList.remove('active');
    document.getElementById('runBtn').disabled = true;
    setTimeout(()=>{
      const seed = selectedScenario + '_' + query;
      const rng = createRng(seed);
      const data = knowledge[selectedScenario];
      let html = '';

      if(selectedScenario === 'training'){
        html = `
          <div class="card">
            <h3>📚 ${data.title}</h3>
            <div style="font-size:14px;line-height:1.8;white-space:pre-wrap;margin-bottom:12px;">${data.content}</div>
            <div style="font-size:13px;color:var(--muted);"><strong>要点：</strong>${data.points.join(' · ')}</div>
            <div style="margin-top:10px;font-size:12px;color:#991b1b;"><strong>合规提醒：</strong>${data.compliance.join(' · ')}</div>
          </div>`;
      } else if(selectedScenario === 'communication' || selectedScenario === 'objection'){
        html = `
          <div class="card">
            <h3>🗣️ ${data.title}</h3>
            <div class="script-step"><div class="step-num">1</div><div class="step-body"><strong>开场：</strong>${data.opening}</div></div>
            <div class="script-step"><div class="step-num">2</div><div class="step-body"><strong>探询：</strong><br>${data.probing.map(p=>'• '+p).join('<br>')}</div></div>
            <div class="script-step"><div class="step-num">3</div><div class="step-body"><strong>呈现：</strong><br>${data.presentation.replace(/\n/g,'<br>')}</div></div>
            <div class="script-step"><div class="step-num">4</div><div class="step-body"><strong>收尾：</strong>${data.closing}</div></div>
          </div>`;
      } else if(selectedScenario === 'product'){
        html = `
          <div class="card">
            <h3>📦 ${data.title}</h3>
            <div style="margin-bottom:10px;"><strong>核心卖点：</strong> ${data.highlights.join(' · ')}</div>
            <div style="margin-bottom:10px;"><strong>目标客群：</strong> ${data.targets.join(' · ')}</div>
            <div style="margin-bottom:10px;"><strong>异议处理：</strong></div>
            ${Object.entries(data.objections).map(([k,v])=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;"><strong>${k}：</strong>${v}</div>`).join('')}
            <div style="margin-top:10px;font-size:12px;color:#991b1b;"><strong>合规要点：</strong> ${data.compliance.join(' · ')}</div>
          </div>`;
      } else if(selectedScenario === 'compliance'){
        html = `
          <div class="card">
            <h3>⚠️ ${data.title}</h3>
            <div class="compliance-badge badge-red">风险等级：${data.level}</div>
            <div style="font-size:13px;line-height:1.8;">
              <div><strong>法规依据：</strong>${data.law}</div>
              <div><strong>后果：</strong>${data.consequence}</div>
              <div><strong>正确做法：</strong>${data.correct}</div>
              <div style="margin-top:8px;padding:10px;background:#f8fafc;border-radius:8px;"><strong>参考话术：</strong><br>${data.script}</div>
            </div>
          </div>`;
      } else {
        html = `
          <div class="card">
            <h3>❓ ${data.title}</h3>
            ${data.items.map(item=>`<div class="faq-item"><div class="faq-q">${item.q}</div><div class="faq-a">${item.a}</div></div>`).join('')}
          </div>`;
      }

      document.getElementById('resultContent').innerHTML = html;
      document.getElementById('loading').classList.remove('active');
      document.getElementById('result').classList.add('active');
      document.getElementById('runBtn').disabled = false;
    },800);
  }
  window.generateResponse = generateResponse;
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    const radarContainer = document.querySelector('.risk-radar, #risk-radar, [data-type="risk"]');
    if (radarContainer) {
        const result = await LongmaAPI.risk.getRadar('示例企业');
        if (result.success && result.data) {
            renderRiskRadar(radarContainer, result.data);
        }
    }
});

function renderRiskRadar(container, data) {
    let html = `<div class="api-risk-summary">
        <h3>${data.enterprise} - 综合评分: ${data.overall_score}</h3>
        <div class="api-dimensions">`;
    data.dimensions.forEach(dim => {
        const levelClass = dim.level === 'low' ? 'safe' : dim.level === 'medium' ? 'warning' : 'danger';
        html += `<div class="api-dim-item ${levelClass}">
            <span class="name">${dim.name}</span>
            <span class="score">${dim.score}</span>
            <span class="level">${dim.level}</span>
        </div>`;
    });
    html += '</div></div>';
    if (data.alerts && data.alerts.length > 0) {
        html += '<div class="api-alerts"><h4>预警信息</h4>';
        data.alerts.forEach(alert => {
            html += `<div class="api-alert ${alert.type}">${alert.message}</div>`;
        });
        html += '</div>';
    }
    container.innerHTML = html;
}
</script>

    <script>
    (function(){
        if('IntersectionObserver' in window){
            var io=new IntersectionObserver(function(entries){
                entries.forEach(function(e){
                    if(e.isIntersecting){
                        var el=e.target;
                        var bg=el.getAttribute('data-bg');
                        if(bg){el.style.backgroundImage='url('+bg+')';el.removeAttribute('data-bg');}
                        io.unobserve(el);
                    }
                });
            },{rootMargin:'100px'});
            document.querySelectorAll('[data-bg]').forEach(function(el){io.observe(el);});
        }
    })();
    </script>
