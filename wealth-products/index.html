<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理财产品 - FinAIAI</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .product-card { border: 1px solid #ddd; padding: 16px; margin-bottom: 12px; border-radius: 8px; }
        .product-name { font-size: 18px; font-weight: bold; color: #333; }
        .product-rate { color: #f60; font-size: 24px; }
        .btn { width: 100%; padding: 12px; background: #f60; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 理财产品</h1>
        <div class="product-card">
            <div class="product-name">稳健理财</div>
            <div class="product-rate">4.5%</div>
            <p>中低风险 | 1年期 | 起购1000元</p>
            <button class="btn" onclick="buy('稳健理财')">立即购买</button>
        </div>
    </div>
    <script src="../api-client.js"></script>
    <script>
        function buy(name) {
            LongmaAPI.post('/api/wealth/buy', { product: name, amount: 10000 })
                .then(() => alert('购买申请已提交'))
                .catch(e => alert('购买失败: ' + e));
        }
    </script>
</body>
</html>
