<style>
:root{--bg:#f0f2f5;--card:#fff;--primary:#2563eb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--radius:14px;--shadow:0 4px 20px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding-bottom:40px}
.container{max-width:420px;margin:0 auto;padding:16px}

/* 头部 */
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:13px;color:var(--muted);margin-top:4px}

/* 卡片 */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);animation:fadeIn .6s ease forwards;opacity:0;transform:translateY(12px)}
.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}.card:nth-child(4){animation-delay:.15s}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* 输入表单 */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-item{display:flex;flex-direction:column;gap:4px}
.form-item.full{grid-column:1/-1}
.form-item label{font-size:12px;color:var(--muted);font-weight:500}
.form-item input,.form-item select{padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:#fff}
.form-item input:focus,.form-item select:focus{outline:none;border-color:var(--primary)}

/* 按钮 */
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;box-shadow:var(--shadow)}
.btn:active{transform:scale(.98)}

/* 执行摘要 */
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.summary-item{padding:12px;background:#f8fafc;border-radius:10px;text-align:center;border:1px solid var(--border)}
.summary-item .val{font-size:20px;font-weight:800;color:var(--primary)}
.summary-item .val.danger{color:var(--danger)}
.summary-item .val.success{color:var(--success)}
.summary-item .label{font-size:11px;color:var(--muted);margin-top:2px}

/* 金字塔 */
.pyramid-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:10px}
.pyramid-layer{position:relative;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;transition:transform .2s}
.pyramid-layer:hover{transform:scale(1.02)}
.pyramid-layer span{position:relative;z-index:1}
.pyramid-layer .amt{position:absolute;right:8px;font-size:10px;opacity:.9}
.pyramid-tip{width:60%;height:36px;background:linear-gradient(135deg,#ef4444,#f97316);clip-path:polygon(50% 0,100% 100%,0 100%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;color:#fff;font-size:11px;font-weight:700}
.pyramid-layer1{width:80%;height:42px;background:linear-gradient(135deg,#f59e0b,#fbbf24)}
.pyramid-layer2{width:90%;height:42px;background:linear-gradient(135deg,#3b82f6,#60a5fa)}
.pyramid-layer3{width:100%;height:42px;background:linear-gradient(135deg,#10b981,#34d399)}
.pyramid-legend{display:flex;justify-content:center;gap:12px;margin-top:8px;font-size:11px;color:var(--muted)}
.pyramid-legend span{display:flex;align-items:center;gap:4px}
.pyramid-dot{width:8px;height:8px;border-radius:50%}

/* 缺口条形图 */
.gap-wrap{margin-top:10px}
.gap-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.gap-label{width:50px;font-size:12px;font-weight:600}
.gap-bar-wrap{flex:1;height:24px;background:var(--border);border-radius:6px;overflow:hidden;position:relative}
.gap-bar{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;color:#fff;font-size:10px;font-weight:700;transition:width .8s ease}
.gap-bar-have{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.35);border-radius:6px}
.gap-val{font-size:12px;font-weight:700;white-space:nowrap;min-width:40px;text-align:right}

/* 饼图 */
.pie-wrap{display:flex;align-items:center;gap:16px;margin-top:10px}
.pie-chart{width:120px;height:120px;border-radius:50%;position:relative;flex-shrink:0}
.pie-legend{flex:1;font-size:12px}
.pie-legend-item{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.pie-dot{width:10px;height:10px;border-radius:2px}

/* 情景卡片 */

.scenario-card{padding:12px;background:#f8fafc;border-radius:10px;border:1px solid var(--border);border-left:4px solid var(--primary)}
.scenario-card.danger{border-left-color:var(--danger)}
.scenario-card.warning{border-left-color:var(--warning)}
.scenario-card.success{border-left-color:var(--success)}
.scenario-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.scenario-tag{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap}
.scenario-title{font-size:13px;font-weight:700}
.scenario-desc{font-size:11px;color:var(--muted);margin-bottom:6px}
.scenario-nums{display:flex;gap:12px}
.scenario-num{font-size:11px}
.scenario-num b{font-size:14px}

/* 现金流 */
.cashflow-wrap{margin-top:10px}
.cashflow-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}

/* 年度检视 */

@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}

<script>
/* ===== 核心计算逻辑 ===== */
function generatePlan(){
  const name = document.getElementById('name').value || '客户';
  const age = parseInt(document.getElementById('age').value) || 35;
  const income = parseFloat(document.getElementById('income').value) || 50;
  const mortgage = parseFloat(document.getElementById('mortgage').value) || 0;
  const children = parseInt(document.getElementById('children').value) || 0;
  const spouse = parseInt(document.getElementById('spouse').value);
  const existCi = parseFloat(document.getElementById('existCi').value) || 0;
  const existLife = parseFloat(document.getElementById('existLife').value) || 0;
  const existMedical = parseFloat(document.getElementById('existMedical').value) || 0;
  const existAccident = parseFloat(document.getElementById('existAccident').value) || 0;

  // 三种保额计算法
  const doubleTenCi = income * 3;
  const doubleTenLife = income * 10;
  const doubleTenPremium = income * 0.10;

  const remainingYears = Math.max(60 - age, 5);
  const lifeValueLife = income * remainingYears;
  const lifeValueCi = income * 3 + mortgage * 0.5;

  const needLife = income * 10 + mortgage + children * 50 + spouse * 30;
  const needCi = Math.max(income * 3, 50);
  const needMedical = 300;
  const needAccident = Math.max(income * 5, 100);

  // 综合建议
  const recCi = Math.round((doubleTenCi + lifeValueCi + needCi) / 3);
  const recLife = Math.round((doubleTenLife + lifeValueLife + needLife) / 3);
  const recMedical = needMedical;
  const recAccident = needAccident;

  // 缺口
  const gapCi = Math.max(0, recCi - existCi);
  const gapLife = Math.max(0, recLife - existLife);
  const gapMedical = Math.max(0, recMedical - existMedical);
  const gapAccident = Math.max(0, recAccident - existAccident);
  const totalGap = gapCi + gapLife + gapMedical + gapAccident;

  // 保费预算
  const totalBudget = income * 0.10;
  let ciPrem = 0, lifePrem = 0, medPrem = 0, accPrem = 0;
  if(totalGap > 0){
    ciPrem = totalBudget * (gapCi / totalGap) * 0.55;
    lifePrem = totalBudget * (gapLife / totalGap) * 0.30;
    medPrem = totalBudget * (gapMedical / totalGap) * 0.10;
    accPrem = totalBudget * (gapAccident / totalGap) * 0.05;
  }

  // 优先级
  const priorities = [];
  if(gapLife > 0) priorities.push({type:'寿险', gap:gapLife, reason:'家庭责任+债务覆盖'});
  if(gapCi > 0) priorities.push({type:'重疾险', gap:gapCi, reason:'收入补偿+医疗费用'});
  if(gapMedical > 0) priorities.push({type:'医疗险', gap:gapMedical, reason:'百万医疗/中端医疗'});
  if(gapAccident > 0) priorities.push({type:'意外险', gap:gapAccident, reason:'低价高保障'});

  // 情景
  const scenarios = [
    {name:'重疾发生', tag:'🏥', color:'danger', desc:'主要家庭成员确诊重大疾病，收入中断+医疗支出', impact:-(income*0.8+30), withIns:-(income*0.8+30)+Math.min(recCi,80)},
    {name:'意外事故', tag:'🚨', color:'warning', desc:'交通事故导致伤残，一次性赔付+收入减少', impact:-(income*0.5+20), withIns:-(income*0.5+20)+Math.min(recAccident,100)},
    {name:'长寿风险', tag:'👴', color:'success', desc:'寿命延长至90岁，养老金储备不足', impact:-(income*0.3), withIns:-(income*0.3)+20},
    {name:'失业/收入中断', tag:'💼', color:'success', desc:'主动收入中断6个月，家庭支出持续', impact:-(income*0.5), withIns:-(income*0.5)},
  ];

  // 现金流
  const monthlyIncome = income / 12;
  const monthlyExpense = monthlyIncome * 0.6;
  const emergencyMonths = Math.max(3, Math.min(12, Math.round(age/5)));
  const emergencyFund = monthlyExpense * emergencyMonths;

  const data = {name, age, income, mortgage, children, spouse, existCi, existLife, existMedical, existAccident,
    recCi, recLife, recMedical, recAccident, gapCi, gapLife, gapMedical, gapAccident, totalGap, totalBudget,
    ciPrem, lifePrem, medPrem, accPrem, priorities, scenarios, monthlyIncome, monthlyExpense, emergencyMonths, emergencyFund,
    doubleTenCi, doubleTenLife, lifeValueLife, lifeValueCi, needLife, needCi
  };

  renderSummary(data);
  renderPriority(data);
  renderPyramid(data);
  renderGap(data);
  renderPie(data);
  renderScenario(data);
  renderCashflow(data);
  renderReview(data);

  ['sec-summary','sec-priority','sec-pyramid','sec-gap','sec-pie','sec-scenario','sec-cashflow','sec-review']
    .forEach(id=>document.getElementById(id).style.display='block');
}

function renderPie(d){
  const wrap = document.getElementById('pieWrap');
  const total = d.ciPrem + d.lifePrem + d.medPrem + d.accPrem;
  const items = [
    {name:'重疾险', val:d.ciPrem, color:'#f59e0b'},
    {name:'寿险', val:d.lifePrem, color:'#ef4444'},
    {name:'医疗险', val:d.medPrem, color:'#3b82f6'},
    {name:'意外险', val:d.accPrem, color:'#10b981'},
  ];
  let cum = 0;
  const grad = items.map(a=>{
    const s = (cum/total)*360;
    cum += a.val;
    const e = (cum/total)*360;
    return `${a.color} ${s}deg ${e}deg`;
  }).join(',');
  wrap.innerHTML = `
    <div class="pie-chart" style="background:conic-gradient(${grad})"></div>
    <div class="pie-legend">
      ${items.map(a=>`<div class="pie-legend-item"><div class="pie-dot" style="background:${a.color}"></div><span>${a.name} ${a.val.toFixed(2)}万 (${(a.val/total*100).toFixed(0)}%)</span></div>`).join('')}

  `;
}

  html += '</tbody></table>';
  
  function summarize(arr){
    if(arr.some(x=>x.includes("拒保"))) return "拒保";
    if(arr.some(x=>x.includes("加费"))) return "加费";
    if(arr.some(x=>x.includes("除外"))) return "除外";
    if(arr.some(x=>x.includes("延期"))) return "延期";
    return "标体";
  }
  
  html += '<div style="margin-top:14px;padding:14px;background:linear-gradient(135deg,#dbeafe,#eff6ff);border-radius:12px">';
  html += '<div style="font-size:13px;color:var(--muted);margin-bottom:8px">综合核保结论</div>';
  html += '<div style="display:flex;gap:12px;flex-wrap:wrap">';
  html += '<div style="flex:1;min-width:100px;padding:10px;background:#fff;border-radius:10px;text-align:center"><div style="font-size:11px;color:var(--muted)">重疾险</div><div style="font-size:18px;font-weight:800;color:var(--primary)">'+summarize(allCi)+'</div></div>';
  html += '<div style="flex:1;min-width:100px;padding:10px;background:#fff;border-radius:10px;text-align:center"><div style="font-size:11px;color:var(--muted)">定期寿险</div><div style="font-size:18px;font-weight:800;color:var(--primary)">'+summarize(allLife)+'</div></div>';
  html += '<div style="flex:1;min-width:100px;padding:10px;background:#fff;border-radius:10px;text-align:center"><div style="font-size:11px;color:var(--muted)">医疗险</div><div style="font-size:18px;font-weight:800;color:var(--primary)">'+summarize(allMed)+'</div></div>';
  html += '</div></div>';
  
  if(age > 55) html += '<div style="margin-top:10px;padding:10px;background:#fef3c7;border-radius:10px;font-size:12px;color:#92400e">年龄>55岁，建议优先考虑消费型保险和养老险</div>';
  else if(age > 45) html += '<div style="margin-top:10px;padding:10px;background:#fef3c7;border-radius:10px;font-size:12px;color:#92400e">年龄45-55岁，重疾险费率逐渐上升</div>';
  
  html += '<div style="margin-top:10px;padding:10px;background:#f0fdf4;border-radius:10px;font-size:12px;line-height:1.8;color:var(--success)"><b>核保提示：</b><br>• 以上为模拟结论，实际以保险公司核保审核为准<br>• 标体=按标准费率承保 | 加费=更高保费 | 除外=该疾病不赔付 | 拒保=不接受投保 | 延期=待治愈后审核</div>';
  
  document.getElementById('underwritingWrap').innerHTML = html;
}

</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 绑定AI分析按钮
    const analyzeBtn = document.querySelector('#analyze-btn, .analyze-btn, [data-action="analyze"]');
    if (analyzeBtn) {
        analyzeBtn.addEventListener('click', async function() {
            const input = document.querySelector('#analyze-input, .analyze-input');
            const context = document.querySelector('#analyze-context, .analyze-context');
            const resultContainer = document.querySelector('#analyze-result, .analyze-result');
            
            const prompt = input ? input.value : '';
            const ctx = context ? context.value : '';
            
            if (!prompt) { alert('请输入分析内容'); return; }
            
            resultContainer.innerHTML = '<div class="api-loading"><div class="loading-spinner"></div><p>AI分析中...</p></div>';
            analyzeBtn.disabled = true;
            
            const result = await LongmaAPI.ai.analyze(prompt, ctx);
            analyzeBtn.disabled = false;
            
            if (result.success) {
                resultContainer.innerHTML = `<div class="api-analysis-result">
                    <h4>分析结果</h4>
                    <div class="content">${result.data.analysis.replace(/\n/g, '<br>')}</div>
                    <div class="meta">模型: ${result.data.model} | 时间: ${result.data.timestamp}</div>
                </div>`;
            } else {
                resultContainer.innerHTML = `<div class="api-error">分析失败: ${result.error}</div>`;
            }
        });
    }
    
    // 绑定报告生成按钮
    const reportBtn = document.querySelector('#report-btn, .report-btn, [data-action="generate-report"]');
    if (reportBtn) {
        reportBtn.addEventListener('click', async function() {
            const resultContainer = document.querySelector('#report-result, .report-result');
            resultContainer.innerHTML = '<div class="api-loading"><div class="loading-spinner"></div><p>报告生成中...</p></div>';
            reportBtn.disabled = true;
            
            const result = await LongmaAPI.ai.generateReport('general', {});
            reportBtn.disabled = false;
            
            if (result.success) {
                resultContainer.innerHTML = `<div class="api-report-result">
                    <h4>生成的报告</h4>
                    <div class="content">${result.data.report.replace(/\n/g, '<br>')}</div>
                </div>`;
            } else {
                resultContainer.innerHTML = '<div class="api-error">报告生成失败</div>';
            }
        });
    }
});
</script>

    <script>
    (function(){
        if('IntersectionObserver' in window){
            var io=new IntersectionObserver(function(entries){
                entries.forEach(function(e){
                    if(e.isIntersecting){
                        var el=e.target;
                        var bg=el.getAttribute('data-bg');
                        if(bg){el.style.backgroundImage='url('+bg+')';el.removeAttribute('data-bg');}
                        io.unobserve(el);
                    }
                });
            },{rootMargin:'100px'});
            document.querySelectorAll('[data-bg]').forEach(function(el){io.observe(el);});
        }
    })();
    </script>
