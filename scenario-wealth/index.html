<script>
(function(){
  function cyrb128(str){
    let h1=1779033703,h2=3144134277,h3=1013904242,h4=2773480762;
    for(let i=0,k;i<str.length;i++){
      k=str.charCodeAt(i);
      h1=h2^Math.imul(h1^k,597399067);
      h2=h3^Math.imul(h2^k,2869860233);
      h3=h4^Math.imul(h3^k,951274213);
      h4=h1^Math.imul(h4^k,2716044179);
    }
    h1=Math.imul(h3^(h1>>>18),597399067);
    h2=Math.imul(h4^(h2>>>22),2869860233);
    h3=Math.imul(h1^(h3>>>17),951274213);
    h4=Math.imul(h2^(h4>>>19),2716044179);
    return [(h1^h2^h3^h4)>>>0,(h2^h1)>>>0,(h3^h1)>>>0,(h4^h1)>>>0];
  }
  function sfc32(a,b,c,d){
    return function(){
      a>>>=0;b>>>=0;c>>>=0;d>>>=0;
      let t=(a+b)|0;
      a=b^b>>>9;
      b=c+(c<<3)|0;
      c=(c<<21)|(c>>>11);
      d=d+1|0;
      t=t+d|0;
      c=c+t|0;
      return (t>>>0)/4294967296;
    };
  }
  function createRng(seed){ const s=cyrb128(seed); return sfc32(s[0],s[1],s[2],s[3]); }

  const riskProfiles = {
    conservative: {name:"保守型",exp:"预期收益 3%-4%",maxDD:"最大回撤 -3%",desc:"以保本为首要目标，适合风险承受能力较低的投资者。"},
    steady: {name:"稳健型",exp:"预期收益 4%-6%",maxDD:"最大回撤 -5%",desc:"在控制风险的基础上追求稳健增值。"},
    balanced: {name:"平衡型",exp:"预期收益 6%-8%",maxDD:"最大回撤 -12%",desc:"股债平衡，适合能承受中等波动的投资者。"},
    growth: {name:"成长型",exp:"预期收益 8%-12%",maxDD:"最大回撤 -20%",desc:"以权益为主，适合追求较高收益的投资者。"},
    aggressive: {name:"积极型",exp:"预期收益 10%-15%",maxDD:"最大回撤 -30%",desc:"高风险高收益，适合风险承受能力强的专业投资者。"}
  };

  window.genWealth = function(){
    const type = document.getElementById('riskType').value;
    const aum = parseFloat(document.getElementById('aum').value) || 500;
    const age = parseInt(document.getElementById('age').value) || 40;
    const horizon = document.getElementById('horizon').value;
    const p = riskProfiles[type];

    document.getElementById('loading').classList.add('active');
    document.getElementById('result').classList.remove('active');
    document.getElementById('runBtn').disabled = true;

    setTimeout(()=>{
      const seed = type + '_' + aum + '_' + age + '_' + horizon;
      const rng = createRng(seed);

      // 战略资产配置 SAA
      let saa;
      if(type === 'conservative') {
        saa = [{name:"货币基金",ratio:20,color:"#2563eb",amount:Math.round(aum*0.2)},
               {name:"短债基金",ratio:35,color:"#10b981",amount:Math.round(aum*0.35)},
               {name:"中长债基金",ratio:30,color:"#06b6d4",amount:Math.round(aum*0.30)},
               {name:"固收+组合",ratio:15,color:"#f59e0b",amount:Math.round(aum*0.15)}];
      } else if(type === 'steady') {
        saa = [{name:"货币基金",ratio:10,color:"#2563eb",amount:Math.round(aum*0.10)},
               {name:"短债基金",ratio:25,color:"#10b981",amount:Math.round(aum*0.25)},
               {name:"中长债基金",ratio:30,color:"#06b6d4",amount:Math.round(aum*0.30)},
               {name:"固收+组合",ratio:20,color:"#f59e0b",amount:Math.round(aum*0.20)},
               {name:"指数基金",ratio:15,color:"#8b5cf6",amount:Math.round(aum*0.15)}];
      } else if(type === 'balanced') {
        saa = [{name:"货币基金",ratio:5,color:"#2563eb",amount:Math.round(aum*0.05)},
               {name:"短债基金",ratio:15,color:"#10b981",amount:Math.round(aum*0.15)},
               {name:"中长债基金",ratio:20,color:"#06b6d4",amount:Math.round(aum*0.20)},
               {name:"固收+组合",ratio:20,color:"#f59e0b",amount:Math.round(aum*0.20)},
               {name:"指数基金",ratio:25,color:"#8b5cf6",amount:Math.round(aum*0.25)},
               {name:"股票基金",ratio:15,color:"#ef4444",amount:Math.round(aum*0.15)}];
      } else if(type === 'growth') {
        saa = [{name:"货币基金",ratio:5,color:"#2563eb",amount:Math.round(aum*0.05)},
               {name:"短债基金",ratio:10,color:"#10b981",amount:Math.round(aum*0.10)},
               {name:"指数基金",ratio:30,color:"#8b5cf6",amount:Math.round(aum*0.30)},
               {name:"股票基金",ratio:30,color:"#ef4444",amount:Math.round(aum*0.30)},
               {name:"主题基金",ratio:25,color:"#f59e0b",amount:Math.round(aum*0.25)}];
      } else {
        saa = [{name:"货币基金",ratio:5,color:"#2563eb",amount:Math.round(aum*0.05)},
               {name:"指数基金",ratio:25,color:"#8b5cf6",amount:Math.round(aum*0.25)},

      // 具体产品推荐
      const products = {

          {code:"易方达信用债A",name:"易方达信用债主体",type:"债券型",risk:"低",ret:"4.2%"},

      const selectedProducts = products[type];

      // 压力测试

        {scenario:"正常市场",ret: type==='conservative'?3.5:type==='steady'?5:type==='balanced'?7:type==='growth'?10:13,aumEnd:0},

                <td style="color:${t.ret>=0?'#059669':'#dc2626'};font-weight:800;">${t.ret>=0?'+':''}${t.ret}%</td>
                <td>${t.aumEnd}万</td>
                <td style="color:${t.aumEnd>=aum?'#059669':'#dc2626'}">${t.aumEnd>=aum?'+':''}${t.aumEnd-aum}万</td>
              </tr>
            `).join('')}
          </table>
        </div>

        <div class="card">
          <h3>🔄 再平衡策略</h3>
          <div style="font-size:14px;line-height:1.8;">
            <div>• <strong>频率：</strong>每${rebalanceFreq}进行一次定期再平衡</div>
            <div>• <strong>阈值：</strong>任一资产类别偏离目标配置${rebalanceThreshold}时触发再平衡</div>
            <div>• <strong>方法：</strong>卖出超配置资产，买入低配置资产，恢复目标比例</div>
            <div>• <strong>税务优化：</strong>优先出售持有超过1年的资产（免证个税）</div>
          </div>
        </div>

        <div class="card">
          <h3>📋 管理建议</h3>
          <div style="font-size:14px;line-height:1.8;">
            <div style="margin:8px 0;padding:10px;background:#f8fafc;border-radius:10px;">
              <span class="rebalance-tag" style="background:#dbeafe;color:#1e40af;">第1条</span>
              每月定投${Math.round(aum*0.02)}万元，采用均价成本法平滑市场波动
            </div>
            <div style="margin:8px 0;padding:10px;background:#f8fafc;border-radius:10px;">
              <span class="rebalance-tag" style="background:#d1fae5;color:#065f46;">第2条</span>
              每季度检查组合表现，评估是否需要调整风险偏好
            </div>
            <div style="margin:8px 0;padding:10px;background:#f8fafc;border-radius:10px;">
              <span class="rebalance-tag" style="background:#fed7aa;color:#92400e;">第3条</span>
              年度风险评估与目标检视，根据年龄增长逐步降低权益比例
            </div>
            <div style="margin:8px 0;padding:10px;background:#f8fafc;border-radius:10px;">
              <span class="rebalance-tag" style="background:#fecaca;color:#991b1b;">第4条</span>
              重大市场变动时，保持冷静，避免追涨杀跌
            </div>
          </div>
        </div>`;

      document.getElementById('loading').classList.remove('active');
      document.getElementById('result').classList.add('active');
      document.getElementById('runBtn').disabled = false;
    },800);
  };
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    // 自动加载股票数据
    const stockContainer = document.querySelector('.stock-data, #stock-data, [data-type="stocks"]');
    if (stockContainer) {
        const result = await LongmaAPI.stocks.list();
        if (result.success && result.data) {
            renderStockList(stockContainer, result.data);
        }
    }
    
    // 自动加载基金数据
    const fundContainer = document.querySelector('.fund-data, #fund-data, [data-type="funds"]');
    if (fundContainer) {
        const result = await LongmaAPI.funds.get('110022');
        if (result.success && result.data) {
            renderFundCard(fundContainer, result.data);
        }
    }
});

function renderStockList(container, stocks) {
    let html = '<div class="api-stock-list">';
    stocks.forEach(stock => {
        const changeClass = stock.change >= 0 ? 'up' : 'down';
        const changeSign = stock.change >= 0 ? '+' : '';
        html += `<div class="api-stock-item ${changeClass}">
            <span class="code">${stock.code}</span>
            <span class="name">${stock.name}</span>
            <span class="price">¥${stock.price.toFixed(2)}</span>
            <span class="change">${changeSign}${(stock.change * 100).toFixed(2)}%</span>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function renderFundCard(container, fund) {
    container.innerHTML = `<div class="api-fund-card">
        <h4>${fund.name}</h4>
        <p>净值: ¥${fund.nav.toFixed(3)}</p>
        <p>日涨跌: ${fund.change > 0 ? '+' : ''}${(fund.change * 100).toFixed(2)}%</p>
        <p>风险等级: ${fund.risk}</p>
    </div>`;
}
</script>

    <script>
    (function(){
        if('IntersectionObserver' in window){
            var io=new IntersectionObserver(function(entries){
                entries.forEach(function(e){
                    if(e.isIntersecting){
                        var el=e.target;
                        var bg=el.getAttribute('data-bg');
                        if(bg){el.style.backgroundImage='url('+bg+')';el.removeAttribute('data-bg');}
                        io.unobserve(el);
                    }
                });
            },{rootMargin:'100px'});
            document.querySelectorAll('[data-bg]').forEach(function(el){io.observe(el);});
        }
    })();
    </script>
